<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UP TGT हिंदी 2021 — PYQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

:root {
  --bg:#f0f4ff;--surface:#fff;--surface2:#f8faff;
  --border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --primary:#4f46e5;--primary-dark:#3730a3;--primary-light:#eef2ff;
  --pyq:#0891b2;--pyq-bg:#ecfeff;--pyq-dark:#0e7490;
  --ts:#ea580c;--ts-bg:#fff7ed;--ts-dark:#c2410c;
  --correct:#16a34a;--correct-bg:#dcfce7;--correct-bdr:#86efac;
  --wrong:#dc2626;--wrong-bg:#fee2e2;--wrong-bdr:#fca5a5;
  --trick:#d97706;--trick-bg:#fffbeb;--trick-bdr:#fcd34d;
  --sel-bg:#eef2ff;--sel-bdr:#4f46e5;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --r:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f1117;--surface:#1a1d27;--surface2:#141720;
    --border:#2d3141;--text:#e2e8f0;--muted:#94a3b8;
    --primary:#818cf8;--primary-dark:#6366f1;--primary-light:#1e1b4b;
    --pyq:#22d3ee;--pyq-bg:#0c1a1e;--pyq-dark:#0891b2;
    --ts:#fb923c;--ts-bg:#1c0f05;--ts-dark:#ea580c;
    --correct:#4ade80;--correct-bg:#052e16;--correct-bdr:#166534;
    --wrong:#f87171;--wrong-bg:#2d0909;--wrong-bdr:#991b1b;
    --trick:#fbbf24;--trick-bg:#1c1500;--trick-bdr:#92400e;
    --sel-bg:#1e1b4b;--sel-bdr:#818cf8;
    --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.25);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans Devanagari','Mangal',system-ui,sans-serif;
     background:var(--bg);color:var(--text);line-height:1.7;
     -webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

.qheader{position:sticky;top:0;z-index:100;background:var(--surface);
          border-bottom:1px solid var(--border);padding:0 18px;
          box-shadow:0 2px 12px rgba(0,0,0,.08)}
.htop{display:flex;align-items:center;gap:10px;padding:11px 0 7px}
.back{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);
       background:var(--surface2);display:flex;align-items:center;justify-content:center;
       font-size:16px;flex-shrink:0;text-decoration:none;transition:background .15s}
.back:hover{background:var(--pyq-bg)}
.htitle{font-size:14px;font-weight:800;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hmode{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;
        background:var(--pyq-bg);color:var(--pyq);flex-shrink:0}
.stats{display:flex;gap:6px;padding:0 0 9px;flex-wrap:wrap}
.sp{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700;
     padding:3px 11px;border-radius:100px;background:var(--surface2);border:1px solid var(--border)}
.sp.sc{background:var(--correct-bg);color:var(--correct);border-color:var(--correct-bdr)}
.sp.sw{background:var(--wrong-bg);  color:var(--wrong);  border-color:var(--wrong-bdr)}
.pbar{height:3px;background:var(--border);margin:0 -18px}
.pfill{height:100%;background:linear-gradient(90deg,var(--pyq),var(--primary));
        width:0%;transition:width .3s}
.wrap{max-width:780px;margin:0 auto;padding:22px 15px 70px}
.qcard{background:var(--surface);border:1px solid var(--border);
        border-radius:var(--r);padding:20px 20px 16px;margin-bottom:16px;
        box-shadow:var(--shadow)}
.qmeta{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.qnum{font-size:11px;font-weight:800;color:var(--pyq);
       background:var(--pyq-bg);padding:3px 10px;border-radius:100px;letter-spacing:.4px}
.qst{margin-left:auto;font-size:12px;opacity:0;transition:opacity .2s}
.qst.show{opacity:1}
.qtxt{font-size:15px;font-weight:600;line-height:1.65;margin-bottom:14px}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;
      border-radius:9px;border:1.5px solid var(--border);background:var(--surface2);
      cursor:pointer;font-family:inherit;font-size:14px;color:var(--text);
      text-align:left;line-height:1.5;width:100%;transition:all .15s}
.oc{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);
     flex-shrink:0;display:flex;align-items:center;justify-content:center;
     margin-top:1px;font-size:11px;font-weight:800;transition:all .15s;background:var(--surface)}
.opt:hover:not(:disabled) .oc{border-color:var(--pyq);background:var(--pyq-bg)}
.opt:hover:not(:disabled){border-color:var(--pyq);background:var(--pyq-bg)}
.opt:disabled{cursor:default}
.opt.correct{background:var(--correct-bg);border-color:var(--correct-bdr)}
.opt.correct .oc{background:var(--correct);border-color:var(--correct);color:#fff}
.opt.correct .ol{color:var(--correct);font-weight:700}
.opt.wrong{background:var(--wrong-bg);border-color:var(--wrong-bdr)}
.opt.wrong .oc{background:var(--wrong);border-color:var(--wrong);color:#fff}
.opt.wrong .ol{color:var(--wrong);font-weight:700}
.tbox{margin-top:13px;border-radius:9px;border:1.5px solid var(--trick-bdr);
       background:var(--trick-bg);padding:12px 14px;display:none;
       animation:fs .25s ease}
.tbox.show{display:block}
@keyframes fs{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.tlabel{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;
         color:var(--trick);letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px}
.ttext{font-size:13px;line-height:1.7;color:var(--text)}
.ttext strong{color:var(--trick)}
</style>
</head>
<body>
<div class="qheader">
  <div class="htop">
    <a href="../index.html" class="back">←</a>
    <div class="htitle">UP TGT हिंदी 2021</div>
    <div class="hmode">⚡ PYQ</div>
  </div>
  <div class="stats">
    <div class="sp">📋 प्रयास: <span id="va">0</span></div>
    <div class="sp sc">✅ सही: <span id="vc">0</span></div>
    <div class="sp sw">❌ गलत: <span id="vw">0</span></div>
    <div class="sp" style="margin-left:auto">📝 125 प्रश्न</div>
  </div>
  <div class="pbar"><div class="pfill" id="pf"></div></div>
</div>
<div class="wrap" id="qc"></div>
<script>
const Q=[{"id": 1, "question": "1. एक ही कथानायक ‘चेतन’ उपेन्द्रनाथ के कई उपन्यासों का केन्द्रीय पात्र है। उनके किस उपन्यास का नायक ‘चेतन’ नहीं है?", "options": ["गिरती दीवारें", "शहर में घूमता एालरश्रा", "एक नन्‍हीं कंदील", "गर्म राख"], "correct_index": 3, "explanation": "‘उपेन्द्रनाथ अश्क के ‘गर्म राख’ उपन्यास का नायक ‘चेतन’ नहीं है।"}, {"id": 2, "question": "2. ‘शिवराज भूषण’ में कितने अलंकारों का निरूपण हुआ है?", "options": ["15", "51", "99", "105"], "correct_index": 3, "explanation": "‘शिवराज भूषण’ में 105 अलंकारों का निरूपण हुआ है।"}, {"id": 3, "question": "3. ‘आँखों का सपना’ यात्रावृत्त के लेखक है-", "options": ["हरीसुमन विष्ट", "सीतेश आलोक", "वलल्‍लभ डोभाल", "मरुधर मृदुल"], "correct_index": 3, "explanation": "‘आँखों का सपना’ यात्रावृत्त के लेखक ‘मरुधर मृदुल’ हैं।"}, {"id": 4, "question": "4. निम्नलिखित में महाकाव्य के लक्षणों के विषय में एक कथन असत्य है-", "options": ["इसमें सभी नाटक संधियाँ होती हैं", "यह सर्गों में विभक्त होता है", "इसके आरम्भ में देवादि को नमस्कार, आशीर्वाद या वस्तुनिर्देश होता है", "इसमें सभी रस प्रधान रस के रूप में होते हैं"], "correct_index": 3, "explanation": "महाकाव्य में सभी रस प्रधान नहीं होते; शृंगार, वीर, शांत एवं करुण में से कोई एक रस अंगी रूप में और अन्य रस अंग रूप में रहते हैं।"}, {"id": 5, "question": "5. ‘वध-स्थल से छलाँग’ किस लेखक की कहानी है?", "options": ["प्रदीप जायसवाल", "सत्यकेतु विद्यालंकार", "डॉ. धर्मवीर", "ऋषिकेश सुलभ"], "correct_index": 3, "explanation": "‘वध-स्थल से छलाँग’ ऋषिकेश सुलभ की कहानी है।"}, {"id": 6, "question": "6. ‘पद्मावत’ का ‘बँगला’ अनुवाद किसने किया था?", "options": ["मगन ठाकुर", "नसरुददीन हुसैन", "शुजाउद्दौला", "आलोउजाला"], "correct_index": 3, "explanation": "‘पद्मावत’ का ‘बँगला’ अनुवाद ‘आलोउजाला’ ने किया था।"}, {"id": 7, "question": "7. निम्न में से कौन-सा सुमेलित नहीं है?", "options": ["प्रभा खेतान– अपने-अपने चेहरे", "नासिरा शर्मा- ठीकरे की मँगनी", "सूर्यबाला- अग्निपंखी", "मृदुला गर्ग- एक जमीन अपनी"], "correct_index": 3, "explanation": "‘एक जमीन अपनी’ उपन्यास चित्रा मुदगल का है।"}, {"id": 8, "question": "8. निम्नलिखित कृतियों को उनके प्रकाशनवर्ष के अनुसार आरोही क्रम में व्यक्त करने वाली श्रेणी है-", "options": ["जयभारत, साकेत, भारत-भारती, यशोधरा", "भारत-भारती, जयभारत, साकेत, यशोधरा", "यशोधरा, साकेत, भारत-भारती, जयभारत", "भारत-भारती, साकेत, यशोधरा, जयभारत"], "correct_index": 3, "explanation": "प्रकाशनवर्ष के अनुसार आरोही क्रम- भारत-भारती (1912), साकेत (1931), यशोधरा (1932), जयभारत (1952)"}, {"id": 9, "question": "9. ‘वे दिन वे लोग’ शीर्षक संस्मरणात्मक रचना के लेखक कौन है?", "options": ["निर्मल वर्मा", "रामविलास शर्मा", "रघुवीर सहाय", "शिवपूजन सहाय"], "correct_index": 3, "explanation": "‘वे दिन वे लोग’ शीर्षक संस्मरणात्मक रचना के लेखक ‘शिवपूजन सहाय’ हैं।"}, {"id": 10, "question": "10. कलचुरि राजवंश की सात नायिकाओं के नखशिख वर्णन से संबंधित ग्रंथ है?", "options": ["उक्ति व्यक्ति प्रकरण", "कुबलय माला कथा", "वर्णरत्नाकर", "राउर बेलि"], "correct_index": 3, "explanation": "कलचुरि राजवंश की सात नायिकाओं के नखशिख वर्णन से संबंधित ग्रंथ राउर बेलि है।"}, {"id": 11, "question": "11. गोस्वामी विट्ठलनाथ द्वारा ‘अष्टछाप’ की स्थापना का वर्ष है-", "options": ["1555 ई.", "1558 ई.", "1560 ई.", "1565 ई."], "correct_index": 3, "explanation": "गोस्वामी विट्ठलनाथ ने वर्ष 1565 में ‘अष्टछाप’ की स्थापना किया था।"}, {"id": 12, "question": "12. ‘सूरदास का प्रेमपक्ष लोक से न्‍यारा है’ यह कथन किस विद्वान का है?", "options": ["आचार्य हजारीप्रसाद द्विवेदी", "डॉ. रामकुमार वर्मा", "डॉ. बच्चन सिंह", "आचार्य रामचंद्र शुक्ल"], "correct_index": 3, "explanation": "‘सूरदास का प्रेमपक्ष लोक से न्‍यारा है’ यह कथन आचार्य रामचंद्र शुक्ल का है।"}, {"id": 13, "question": "13. गुरु नानकदेव की माता का नाम था?", "options": ["लक्ष्मी", "वितस्ता", "रूपना", "तृप्ता"], "correct_index": 3, "explanation": "गुरु नानकदेव की माता का नाम ‘तृप्ता’ था, इनका जन्म ‘तलवंडी’ में हुआ था।"}, {"id": 14, "question": "14. विधा की दृष्टि से कौन-सी रचना अन्य तीन से भिन्न है?", "options": ["मुर्दहिया", "मणिकर्णिका", "कितनी धूप में कितनी बार", "वटवृक्ष की छाया में"], "correct_index": 3, "explanation": "‘बटवृक्ष को छाया में’ अमृत लाल नागर (कुमुद नागर) की जीवनी है।"}, {"id": 15, "question": "15. कबीर और तुलसी भाषा में एक मिशन के तहत लिख रहे थे।’ यह कथन किसका है?", "options": ["रामचंद्र शुक्ल", "हजारी प्रसाद द्विवेदी", "रामविलास शर्मा", "बच्चन सिंह"], "correct_index": 3, "explanation": "उपरोक्त कथन बच्चन सिंह का है।"}, {"id": 16, "question": "16. आचार्य भरतमुनि ने नाटक में ‘अभिनय’ को किस वेद से लिया गया माना है?", "options": ["ऋग्वेद", "सामवेद", "अथर्ववेद", "यजुर्वेद"], "correct_index": 3, "explanation": "आचार्य भरतमुनि ने नाटक में ‘अभिनय’ को ‘यजुर्वेद’ से लिया गया माना है।"}, {"id": 17, "question": "17. ‘भाषा योग वाशिष्ठ’ का रचनाकाल है-", "options": ["1730 ई.", "1750 ई.", "1761 ई.", "1741 ई."], "correct_index": 3, "explanation": "रामप्रसाद निरंजनी कृत ‘भाषा योग वाशिष्ठ’ का रचनाकाल 1741 ई. है।"}, {"id": 18, "question": "18. ज्ञानचंद्र जैन कृत ‘कथाशेष’ शीर्षक जीवनी किससे संबंधित है?", "options": ["जैनेन्द्र कुमार", "यशपाल", "उषा प्रियंवदा", "अमृतलाल नागर"], "correct_index": 3, "explanation": "ज्ञानचंद्र जैन कृत ‘कथाशेष’ शीर्षक जीवनी अमृतलाल नागर से संबंधित है।"}, {"id": 19, "question": "19. ‘भारतेंदु नाटक मण्डली’ द्वारा अभिनीत पहला नाटक था-", "options": ["विद्यासुंदर", "भारत दुर्दशा", "सतीप्रताप", "सत्य हरिश्चंद्र"], "correct_index": 3, "explanation": "‘भारतेंदु नाटक मंडली’ द्वारा अभिनीत पहला नाटक ‘सत्य हरिश्चंद्र’ था। यह भारतेंदु हरिश्चंद्र द्वारा लिखित चार अंकों का नाटक है।"}, {"id": 20, "question": "20. ‘झोपड़ी से राजभवन’ किस साहित्यकार की आत्मकथा है?", "options": ["श्योराज सिंह बेचैन", "सोहनपाल सुमनाक्षर", "हरपाल सिंह अरुष", "माताप्रसाद"], "correct_index": 3, "explanation": "‘झोपड़ी से राजभवन’ माताप्रसाद की आत्मकथा है।"}, {"id": 21, "question": "21. संत काव्य परंपरा का कौन-सा कवि अपनी विद्वता (सर्वाधिक शिक्षित होने) के कारण प्रसिद्ध है?", "options": ["धर्मदास", "रविदास", "रज्जब", "सुंदरदास"], "correct_index": 3, "explanation": "संत काव्य परंपरा के कवि सुंदरदास अपनी विद्वता (सर्वाधिक शिक्षित होने) के कारण प्रसिद्ध है।"}, {"id": 22, "question": "22. भारतेंदु हरिश्चंद्र की रचना ‘हिंदी भाषा’ का प्रकाशन वर्ष है-", "options": ["1890 ई.", "1885 ई.", "1850 ई.", "1865 ई."], "correct_index": 3, "explanation": "भारतेंदु हरिश्चंद्र की रचना ‘हिंदी भाषा’ का प्रकाशन वर्ष 1865 ई. है।"}, {"id": 23, "question": "23. ‘ए डिक्शनरी ऑफ इंग्लिश एण्ड हिन्दुस्तानी’ के लेखक हैं?", "options": ["जार्ज ग्रियर्सन", "विलियम ग्राउस", "फ्रेडरिक पिंकाट", "जॉर्ज गिलक्राइस्ट"], "correct_index": 3, "explanation": "‘ए डिक्शनरी ऑफ इंग्लिश एण्ड हिन्दुस्तानी’ के लेखक जॉर्ज गिलक्राइस्ट हैं।"}, {"id": 24, "question": "24. ‘तुम्हें सौंपता हूँ’ किसकी काव्य रचना है?", "options": ["नागार्जुन", "शमशेर", "केदारनाथ अग्रवाल", "त्रिलोचन"], "correct_index": 3, "explanation": "‘तुम्हें सौंपता हूँ’ त्रिलोचन की काव्य रचना है।"}, {"id": 25, "question": "25. ‘पार्श्वनाथ चरित’ के लेखक हैं?", "options": ["वीरनन्दी", "धनंजय", "मुनिजिनविजय", "वादिराज"], "correct_index": 3, "explanation": "‘पार्श्वनाथ चरित’ के लेखक जैन कवि वादिराज (दसवीं शताब्दी) हैं।"}, {"id": 26, "question": "26. निम्नलिखित में रचना और रचनाकारों के असंगत युग्म का चयन कीजिए-", "options": ["हे मेरी तुम – केदारनाथ अग्रवाल", "फूल नाम है एक – त्रिलोचन", "नीली रेखा तक – भवानीप्रसाद मिश्र", "लोग भूल गये हैं – शमशेर बहादुर सिंह"], "correct_index": 3, "explanation": "‘लोग भूल गए हैं’ रघुवीर सहाय का काव्य संग्रह है।"}, {"id": 27, "question": "27. ‘ग्लोबल गाँव के देवता’ उपन्यास में ‘सर्वोच्च देवलोक’ किसे कहा गया है?", "options": ["पेरिस", "न्यूयार्क", "दिल्‍ली", "लंदन"], "correct_index": 3, "explanation": "रणेंद्र कृत ‘ग्लोबल गाँव के देवता’ (2006) उपन्यास में ‘सर्वोच्च देवलोक’ लंदन को कहा गया है।"}, {"id": 28, "question": "28. तुलसीदास ने कौन-सी रचना अपनी शारीरिक पीड़ा के निवारणार्थ की थी?", "options": ["विनय पत्रिका", "रामचरित मानस", "जानकी मंगल", "हनुमान बाहुक"], "correct_index": 3, "explanation": "तुलसीदास ने ‘हनुमान बाहुक’ की रचना अपनी शारीरिक पीड़ा के निवारणार्थ की थी।"}, {"id": 29, "question": "29. प्रेम कहानी में उठने वाले सामाजिक अवरोधों की पृष्ठभूमि पर लिखा गया उपन्यास है?", "options": ["जुलूस- फणीश्वरनाथ रेणु", "खुदा सही सलामत- रवींद्र कालिया", "म const AL=['A','B','C','D','E'];
let att=0,cor=0,wrg=0;
function upd(){
  document.getElementById('va').textContent=att;
  document.getElementById('vc').textContent=cor;
  document.getElementById('vw').textContent=wrg;
  document.getElementById('pf').style.width=Math.round(att/Q.length*100)+'%';
}
function build(){
  const c=document.getElementById('qc');
  Q.forEach((q,qi)=>{
    const card=document.createElement('div');
    card.className='qcard';card.id='c'+qi;
    card.innerHTML=`
      <div class="qmeta">
        <span class="qnum">प्रश्न ${qi+1}</span>
        <span class="qst" id="st${qi}"></span>
      </div>
      <div class="qtxt">${q.question}</div>
      <div class="opts" id="o${qi}"></div>
      ${q.explanation?`<div class="tbox" id="t${qi}">
        <div class="tlabel">💡 याद रखें</div>
        <div class="ttext">${q.explanation}</div></div>`:''}`;
    const od=card.querySelector('#o'+qi);
    q.options.forEach((opt,oi)=>{
      const b=document.createElement('button');
      b.className='opt';
      b.innerHTML=`<span class="oc">${AL[oi]}</span><span class="ol">${opt}</span>`;
      b.addEventListener('click',()=>ans(qi,oi));
      od.appendChild(b);
    });
    c.appendChild(card);
  });
}
function ans(qi,ch){
  const q=Q[qi];
  const btns=document.querySelectorAll('#o'+qi+' .opt');
  btns.forEach(b=>b.disabled=true);
  btns[q.correct_index].classList.add('correct');
  btns[q.correct_index].querySelector('.oc').textContent='✓';
  const st=document.getElementById('st'+qi);
  if(ch===q.correct_index){cor++;st.textContent='✅ सही';st.style.color='var(--correct)';}
  else{btns[ch].classList.add('wrong');btns[ch].querySelector('.oc').textContent='✗';
        wrg++;st.textContent='❌ गलत';st.style.color='var(--wrong)';}
  st.classList.add('show');
  const t=document.getElementById('t'+qi);
  if(t)t.classList.add('show');
  att++;upd();
}
build();upd();
</script>
