<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UP TGT हिंदी 2016 — PYQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

:root {
  --bg:#f0f4ff;--surface:#fff;--surface2:#f8faff;
  --border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --primary:#4f46e5;--primary-dark:#3730a3;--primary-light:#eef2ff;
  --pyq:#0891b2;--pyq-bg:#ecfeff;--pyq-dark:#0e7490;
  --ts:#ea580c;--ts-bg:#fff7ed;--ts-dark:#c2410c;
  --correct:#16a34a;--correct-bg:#dcfce7;--correct-bdr:#86efac;
  --wrong:#dc2626;--wrong-bg:#fee2e2;--wrong-bdr:#fca5a5;
  --trick:#d97706;--trick-bg:#fffbeb;--trick-bdr:#fcd34d;
  --sel-bg:#eef2ff;--sel-bdr:#4f46e5;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --r:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f1117;--surface:#1a1d27;--surface2:#141720;
    --border:#2d3141;--text:#e2e8f0;--muted:#94a3b8;
    --primary:#818cf8;--primary-dark:#6366f1;--primary-light:#1e1b4b;
    --pyq:#22d3ee;--pyq-bg:#0c1a1e;--pyq-dark:#0891b2;
    --ts:#fb923c;--ts-bg:#1c0f05;--ts-dark:#ea580c;
    --correct:#4ade80;--correct-bg:#052e16;--correct-bdr:#166534;
    --wrong:#f87171;--wrong-bg:#2d0909;--wrong-bdr:#991b1b;
    --trick:#fbbf24;--trick-bg:#1c1500;--trick-bdr:#92400e;
    --sel-bg:#1e1b4b;--sel-bdr:#818cf8;
    --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.25);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans Devanagari','Mangal',system-ui,sans-serif;
     background:var(--bg);color:var(--text);line-height:1.7;
     -webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

.qheader{position:sticky;top:0;z-index:100;background:var(--surface);
          border-bottom:1px solid var(--border);padding:0 18px;
          box-shadow:0 2px 12px rgba(0,0,0,.08)}
.htop{display:flex;align-items:center;gap:10px;padding:11px 0 7px}
.back{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);
       background:var(--surface2);display:flex;align-items:center;justify-content:center;
       font-size:16px;flex-shrink:0;text-decoration:none;transition:background .15s}
.back:hover{background:var(--pyq-bg)}
.htitle{font-size:14px;font-weight:800;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hmode{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;
        background:var(--pyq-bg);color:var(--pyq);flex-shrink:0}
.stats{display:flex;gap:6px;padding:0 0 9px;flex-wrap:wrap}
.sp{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700;
     padding:3px 11px;border-radius:100px;background:var(--surface2);border:1px solid var(--border)}
.sp.sc{background:var(--correct-bg);color:var(--correct);border-color:var(--correct-bdr)}
.sp.sw{background:var(--wrong-bg);  color:var(--wrong);  border-color:var(--wrong-bdr)}
.pbar{height:3px;background:var(--border);margin:0 -18px}
.pfill{height:100%;background:linear-gradient(90deg,var(--pyq),var(--primary));
        width:0%;transition:width .3s}
.wrap{max-width:780px;margin:0 auto;padding:22px 15px 70px}
.qcard{background:var(--surface);border:1px solid var(--border);
        border-radius:var(--r);padding:20px 20px 16px;margin-bottom:16px;
        box-shadow:var(--shadow)}
.qmeta{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.qnum{font-size:11px;font-weight:800;color:var(--pyq);
       background:var(--pyq-bg);padding:3px 10px;border-radius:100px;letter-spacing:.4px}
.qst{margin-left:auto;font-size:12px;opacity:0;transition:opacity .2s}
.qst.show{opacity:1}
.qtxt{font-size:15px;font-weight:600;line-height:1.65;margin-bottom:14px}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;
      border-radius:9px;border:1.5px solid var(--border);background:var(--surface2);
      cursor:pointer;font-family:inherit;font-size:14px;color:var(--text);
      text-align:left;line-height:1.5;width:100%;transition:all .15s}
.oc{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);
     flex-shrink:0;display:flex;align-items:center;justify-content:center;
     margin-top:1px;font-size:11px;font-weight:800;transition:all .15s;background:var(--surface)}
.opt:hover:not(:disabled) .oc{border-color:var(--pyq);background:var(--pyq-bg)}
.opt:hover:not(:disabled){border-color:var(--pyq);background:var(--pyq-bg)}
.opt:disabled{cursor:default}
.opt.correct{background:var(--correct-bg);border-color:var(--correct-bdr)}
.opt.correct .oc{background:var(--correct);border-color:var(--correct);color:#fff}
.opt.correct .ol{color:var(--correct);font-weight:700}
.opt.wrong{background:var(--wrong-bg);border-color:var(--wrong-bdr)}
.opt.wrong .oc{background:var(--wrong);border-color:var(--wrong);color:#fff}
.opt.wrong .ol{color:var(--wrong);font-weight:700}
.tbox{margin-top:13px;border-radius:9px;border:1.5px solid var(--trick-bdr);
       background:var(--trick-bg);padding:12px 14px;display:none;
       animation:fs .25s ease}
.tbox.show{display:block}
@keyframes fs{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.tlabel{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;
         color:var(--trick);letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px}
.ttext{font-size:13px;line-height:1.7;color:var(--text)}
.ttext strong{color:var(--trick)}
</style>
</head>
<body>
<div class="qheader">
  <div class="htop">
    <a href="../index.html" class="back">←</a>
    <div class="htitle">UP TGT हिंदी 2016</div>
    <div class="hmode">⚡ PYQ</div>
  </div>
  <div class="stats">
    <div class="sp">📋 प्रयास: <span id="va">0</span></div>
    <div class="sp sc">✅ सही: <span id="vc">0</span></div>
    <div class="sp sw">❌ गलत: <span id="vw">0</span></div>
    <div class="sp" style="margin-left:auto">📝 125 प्रश्न</div>
  </div>
  <div class="pbar"><div class="pfill" id="pf"></div></div>
</div>
<div class="wrap" id="qc"></div>
<script>
const Q=[{"id": 1, "question": "1. निम्न पंक्ति में कौन-सा रस है-", "options": ["करुण", "वियोग श्रृंगार रस", "शांति रस", "हास्य रस"], "correct_index": 1, "explanation": "उपर्युक्त पंक्ति में वियोग श्रृंगार रस है। परस्पर प्रेम करने वाले व्यक्तियों के बिछड़ जाने की दशा वियोग श्रृंगार कहलाती है।"}, {"id": 2, "question": "2. निम्न पंक्ति में कौन-सा रस है-", "options": ["अद्भुत रस", "वात्सल्य रस", "रौद्र रस", "भयानक रस"], "correct_index": 1, "explanation": "उपर्युक्त पंक्ति में वात्सल्य रस है। बच्चों के सौंदर्य, उनकी चेष्टाओं आदि को देखकर मन मेन जो स्नेह भाव उत्पन्न होता है उसी से वात्सल्य रस निष्पन्न होता है।"}, {"id": 3, "question": "3. इनमें से किस बोली का ‘बिहारी हिंदी’ से संबंध नहीं है?", "options": ["अवधी", "मगही", "भोजपुरी", "मैथिली"], "correct_index": 0, "explanation": "बिहारी हिंदी मागधी अपभ्रंश की उप भाषा है जिसके अंतर्गत भोजपुरी, मगही, मैथिली बोलियाँ आती हैं। वहीं अवधी पूर्वी हिंदी की बोली है जो अर्द्धमागधी अपभ्रंश के अंतर्गत आती है।"}, {"id": 4, "question": "4. ‘मगही’ किस प्रदेश की बोली है?", "options": ["मध्य प्रदेश", "बिहार", "राजस्थान", "छत्तीसगढ़"], "correct_index": 1, "explanation": "‘मगही बिहार राज्य की बोली है।"}, {"id": 5, "question": "5. सिंधी भाषा का विकास अपभ्रंश की किस बोली से माना गया है?", "options": ["ब्राचड़", "पैचासी", "मागधी", "अर्द्धमागधी"], "correct_index": 0, "explanation": "सिंधी भाषा का विकास ब्राचड़ अपभ्रंश से माना गया है।"}, {"id": 6, "question": "6. निम्न काव्य पंक्तियाँ किस बोली में हैं-", "options": ["ब्रज", "भोजपुरी", "अवधी", "बुंदेली"], "correct_index": 2, "explanation": "ये काव्य पंक्तियाँ अवधी बोली में हैं। इसके रचनाकार सूफी परंपरा के अंतिम कवि नूर मुहम्मद हैं, यह उनके ग्रंथ अनुराग बांसुरी से ली गई हैं।"}, {"id": 7, "question": "7. इनमें से कौन-सा पश्च स्वर है?", "options": ["आ", "इ", "ई", "अ"], "correct_index": 0, "explanation": "जीभ के प्रयोग के आधार पर स्वरों के तीन प्रकार हैं- 1. अग्र स्वर- जिन स्वरों का उच्चारण में जीभ का अगला भाग काम करता है, जैसे- इ, ई, ए, ऐ। 2. मध्य स्वर- जिन स्वरों का उच्चारण में जीभ का मध्य भाग काम करता है, जैसे- अ। 3. पश्च स्वर- जिन स्वरों का उच्चारण में जीभ का पिछला भाग काम करता है, जैसे- आ, उ, ऊ, ओ, औ।"}, {"id": 8, "question": "8. निम्नलिखित में से कौन ‘देशज’ शब्द है?", "options": ["खिड़की", "मित्र", "कालीन", "रेल"], "correct_index": 0, "explanation": "‘खिड़की’ देशज शब्द है। वहीं मित्र- तत्सम शब्द, कालीन- उर्दू शब्द और रेल- अंग्रेजी भाषा का शब्द है।"}, {"id": 9, "question": "9. निम्नलिखित में कौन तालव्य ध्वनि है?", "options": ["च", "प", "ल", "ह"], "correct_index": 0, "explanation": "उच्चारण स्थान के आधार पर च, छ, ज, झ (च वर्ग) और य, श, इ, ई तालव्य ध्वनि हैं।"}, {"id": 10, "question": "10. इनमें से कौन-सी लिपि नहीं है?", "options": ["अरबी", "गुरुमुखी", "देवनागरी", "अंग्रेजी"], "correct_index": 3, "explanation": "अंग्रेजी भाषा है, इसकी लिपि रोमन है। वहीं अरबी भाषा की लिपि अरबी, पंजाबी की गुरुमुखी और हिंदी की देवनागरी है।"}, {"id": 11, "question": "11. ‘छ’ ध्वनि का उच्चारण स्थान है?", "options": ["दंत्य", "ओष्ठय", "तालव्य", "वत्स्य"], "correct_index": 2, "explanation": "‘छ’ ध्वनि का उच्चारण स्थान तालव्य है। तालव्य व्यंजन वो व्यंजन होते हैं जिनके उच्चारण में जीभ के पिछले भाग को तालू से संघर्ष करना पड़ता है, जैसे- च, छ, ज, झ, ञ, य, श, इ, ई।"}, {"id": 12, "question": "12. ‘उसके प्राण सूख गए।’ इस वाक्य में ‘प्राण’ का वचन निर्धारित कीजिए-", "options": ["एकवचन", "बहुवचन", "द्विवचन", "इनमें से कोई नहीं"], "correct_index": 1, "explanation": "‘प्राण’ हमेशा बहुवचन में होता है।"}, {"id": 13, "question": "13. ‘सज्जन’ का संधि-विच्छेद क्या होगा?", "options": ["सद् + जन", "सत् + जन", "सत् + जान", "सज् + जन"], "correct_index": 1, "explanation": "‘सज्जन’ का संधि-विच्छेद ‘सत् + जन’ होगा। व्यंजन संधि से।"}, {"id": 14, "question": "14. ‘ऋणमुक्त’ शब्द में कौन-सा समास है?", "options": ["संबंध तत्पुरुष", "संप्रदान तत्पुरुष", "अधिकरण तत्पुरुष", "अपादान तत्पुरुष"], "correct_index": 3, "explanation": "‘ऋणमुक्त’ शब्द में अपादान तत्पुरुष समास है। जिस शब्द में कारक चिह्न ‘से’ का लोप होता है वहाँ अपादान तत्पुरुष समास होता है। जैसे- ऋणमुक्त = ऋण से मुक्त"}, {"id": 15, "question": "15. इनमें से एक ‘मोक्ष’ का पर्यायवाची शब्द है-", "options": ["निर्वाण", "दशा", "गति", "चाल"], "correct_index": 0, "explanation": "‘मोक्ष’ का पर्यायवाची शब्द- निर्वाण, मुक्ति, छुटकारा आदि हैं।"}, {"id": 16, "question": "16. ‘चर्म’ शब्द का समभिन्नार्थक क्या है?", "options": ["चरम", "चमड़ा", "चित्र", "अंतिम"], "correct_index": 0, "explanation": "‘चर्म’ शब्द का समभिन्नार्थक शब्द ‘चरम’ है।"}, {"id": 17, "question": "17. ‘खाक में मिलना’ मुहावरे का सही अर्थ है-", "options": ["सब तोड़ देना", "कीचड़ में मिला देना", "नष्ट कर देना", "हानि पहुँचाना"], "correct_index": 2, "explanation": "‘खाक में मिलना’ मुहावरे का अर्थ ‘नष्ट कर देना’ है।"}, {"id": 18, "question": "18. इनमें से कौन कालिदास की दूसरी रचना है?", "options": ["रघुवंशम्", "अभिज्ञान शकुंतलम्", "दशरूपक", "प्रतिभा नाटकम्"], "correct_index": 1, "explanation": "‘अभिज्ञान शकुंतलम्’ नाटक कालिदास की दूसरी रचना है। वहीं रघुवंशम् कालिदास का महाकाव्य, दशरूपक धनंजय और प्रतिभा नाटकम् भास का ग्रंथ है।"}, {"id": 19, "question": "19. ‘मालतीमाधव’ किसकी रचना है?", "options": ["भट्टगोपाल", "भवभूति", "श्रीहर्ष", "दंडी"], "correct_index": 1, "explanation": "‘मालतीमाधव’ भवभूति की 10 अंकों का शृंगार प्रधान रचना है।"}, {"id": 20, "question": "20. ‘दशकुमारचरित’ किसकी रचना है?", "options": ["कालिदास", "भवभूति", "दंडी", "भास"], "correct_index": 2, "explanation": "‘दशकुमारचरित’ दंडी की रचना है।"}, {"id": 21, "question": "21. ‘रामू घर से निकला।’ इस वाक्य में ‘घर से’ में कौन-सा कारक है?", "options": ["करण", "अपादान", "कर्ता", "संप्रदान"], "correct_index": 1, "explanation": "‘रामू घर से निकला।’ इस वाक्य में ‘घर से’ में अपादान कारक है। जिस संज्ञा या सर्वनाम से किसी वस्तु का अलग होने का बोध हो, उसे अपादान कारक कहते हैं।"}, {"id": 22, "question": "22. ‘गठरी’ शब्द है-", "options": ["स्त्रीलिंग", "पुल्लिंग", "विधिलिंग", "नपुंसकलिंग"], "correct_index": 0, "explanation": "‘गठरी’ शब्द स्त्रीलिंग है। स्त्री जाति का बोध कराने वाले संज्ञा शब्दों को स्त्रीलिंग कहते हैं।"}, {"id": 23, "question": "23. ‘अत्याचार’ शब्द में कौन-सी संधि है?", "options": ["दीर्घ", "यण्", "गुण", "वृद्धि ल सक्सेना की रचना है। काठ की घंटियाँ, बाँस का पुल, एक सूनी नाव, गर्म हवाएँ, जंगल का दर्द, खुटियों पर टंगे लोग, क्या कहकर पुकारु, कोई मेरे साथ चले, मेघ आए आदि उनके काव्य संग्रह हैं।"}, {"id": 31, "question": "31. नाथ संप्रदाय के प्रवर्तक इनमें से कौन थे?", "options": ["गोरखनाथ", "महानाथ", "चर्पटनाथ", "नेमिनाथ"], "correct_index": 0, "explanation": "नाथ संप्रदाय के प्रवर्तक गोरखनाथ थे। मिश्रबंधुओं ने गोरखनाथ को हिंदी का प्रथम कवि माना है। गोरखनाथ का नाथपंथ बौद्धों की वज्रयान शाखा से निकला हुआ माना जाता है।"}, {"id": 32, "question": "32. महापुराण के रचनाकार कौन हैं?", "options": ["अब्दुर्रहमन", "पुष्यदंत", "धनपाल", "स्वयंभू"], "correct_index": 1, "explanation": "महापुराण के रचनाकार पुष्यदंत हैं। पुष्यदंत को हिंदी का भवभूति कहा जाता है। शिवसिंह सेंगर ने इन्हें ‘भाखा की जड़’ कहा है। तिरसठी महापुरिस गुणालंकार, णयकुमार चरिउ और जसहर चरिउ इनके महत्वपूर्ण ग्रंथ हैं।"}, {"id": 33, "question": "33. ‘रसमंजरी’ किस कवि की कृति है?", "options": ["केशवदास", "भूषण", "नंददास", "छीतस्वामी"], "correct_index": 2, "explanation": "‘रसमंजरी’ कवि नंददास की कृति है। यह एक प्रेमाख्यान काव्य है। अनेकार्थ मंजरी, मानमंजरी, सुदामा चरित, रूपमंजरी, विरहमंजरी, प्रेम बारह खड़ी, श्याम सगाई, रुक्मणी मंगल, भँवरगीत, रासपंचाध्यायी, दशमस्कंध आदि इनके अन्य ग्रंथ हैं।"}, {"id": 34, "question": "34. मृगावती के रचनाकार हैं?", "options": ["मंझन", "आलम", "कुतुबन", "मुल्ला दाऊद"], "correct_index": 2, "explanation": "मृगावती के रचनाकार कुतुबन हैं। कुतुबन को शुक्ल जी सूफी काव्य का प्रथम कवि मानते हैं।"}, {"id": 35, "question": "35. भ्रमणगीत का उपजीव्य ग्रंथ कौन-सा है?", "options": ["श्रीमद्भागवत महापुराण", "विष्णु पुराण", "हरिवंश पुराण", "शिव पुराण"], "correct_index": 0, "explanation": "भ्रमणगीत का उपजीव्य ग्रंथ श्रीमद्भागवत महापुराण है।"}, {"id": 36, "question": "36. विनय पत्रिका की रचना किस भाषा में हुई है?", "options": ["अवधी", "ब्रजभाषा", "मैथिली", "हिंदी"], "correct_index": 1, "explanation": "विनय पत्रिका की रचना ब्रजभाषा में हुई है। तुलसीदास की वैराग्य संदीपनी, कृष्णगीतावली, गीतावली, दोहवाली, कवितावली आदि रचनाएँ भी ब्रजभाषा में रचित हैं।"}, {"id": 37, "question": "37. इनमें से कौन संत कवि नहीं है?", "options": ["कबीरदास", "तुलसीदास", "सुंदरदास", "मलूकदास"], "correct_index": 1, "explanation": "तुलसीदास सगुण काव्यधारा के प्रमुख कवि हैं। वहीं कबीर, सुंदरदास और मलूकदास संत कवि हैं।"}, {"id": 38, "question": "38. ‘राघव चेतन’ इनमें से किस सूफी काव्य का पात्र है?", "options": ["मधुमालती", "मृगावती", "पद्मावत", "चंदायन"], "correct_index": 2, "explanation": "‘राघव चेतन’ जायसी कृत सूफी काव्य ‘पद्मावत’ (1540 ई.) का पात्र है। रत्नसेन, पद्मावती, हीरामन तोता, नागमती, अलाउद्दीन आदि इसके अन्य पात्र हैं।"}, {"id": 39, "question": "39. कुतुबन द्वारा रचित ग्रंथ का नाम है-", "options": ["मृगावती", "मधुमालती", "हंस जवाहिर", "चंदायन"], "correct_index": 0, "explanation": "कुतुबन द्वारा रचित ग्रंथ का नाम मृगावती (1503 ई.) है।"}, {"id": 40, "question": "40. रामभक्ति शाखा में रसिकोपासना का समावेश किसने किया?", "options": ["केशवदास", "अग्रदास", "लालदास", "नाभादास"], "correct_index": 1, "explanation": "रामभक्ति शाखा में रसिकोपासना का समावेश कर स्वामी अग्रदास ने रसिक संप्रदाय की स्थापना की। रसिक संप्रदाय में इन्हें अग्रअली नाम से भी जाना जाता है।"}, {"id": 41, "question": "41. ‘मदनाष्टक’ के रचयिता का नाम क्या है?", "options": ["केशवदास", "रसखान", "रहीम", "नरोत्तमदास"], "correct_index": 2, "explanation": "‘मदनाष्टक’ के रचयिता का नाम रहीम है। दोहावली, नगर शोभा, शृंगार सोरठा, बरवै रामायण आदि इनकी अन्य रचनाएँ हैं।"}, {"id": 42, "question": "42. केशवदास को किस वर्ग में रखना समीचीन है?", "options": ["रीतिबद्ध", "रीतिमुक्त", "रीतिसिद्ध", "स्वच्छंदतावादी कवि"], "correct_index": 0, "explanation": "आचार्य विश्वनाथ प्रसाद मिश्र ने केशवदास को रीतिबद्ध कवि माना है, नगेंद्र ने केशव को रीतिकाल का प्रवर्तक माना है। वहीं रामचंद्र शुक्ल केशव को भक्तिकाल में रखते हैं।"}, {"id": 43, "question": "43. ‘शिवा बावनी’ के रचयिता का नाम है-", "options": ["जसवंत सिंह", "केशव", "भूषण", "पद्माकर"], "correct_index": 2, "explanation": "‘शिवा बावनी’ के रचयिता का नाम भूषण है। शिवराज भूषण और छत्रसाल दशक इनकी अन्य रचनाएँ हैं। शिवा बावनी में शिवा जी की कीर्ति और छत्रसाल दशक में छत्रसाल बुंदेला का यशोगान किया गया है। वहीं शिवराज भूषण अलंकार संबंधी ग्रंथ है जिसमें 500 अलंकारों तथा 284 छ्ंदों का वर्णन है।"}, {"id": 44, "question": "44. भारतेन्दु युग का एक अन्य नाम है-", "options": ["प्रगति प्रयोग काल", "जागरण सुधार काल", "पुनर्जागरण काल", "नव सामंत काल"], "correct_index": 2, "explanation": "भारतेन्दु युग का एक अन्य नाम पुनर्जागरण काल है।"}, {"id": 45, "question": "45. इनमें से भारतेन्दु युगीन लेखक कौन है?", "options": ["पं. प्रताप नारायण मिश्र", "हरिऔध", "विद्यानिवास मिश्र", "रायकृष्ण दास"], "correct_index": 0, "explanation": "पं. प्रताप नारायण मिश्र भारतेन्दु युगीन लेखक हैं।"}, {"id": 46, "question": "46. ‘तारसप्तक’ का प्रकाशन किस सन् में हुआ?", "options": ["1930 ई.", "1940 ई.", "1935 ई.", "1943 ई."], "correct_index": 3, "explanation": "‘तारसप्तक’ का प्रकाशन सन् 1943 ई. में अज्ञेय के संपादकत्व में हुआ। तारसप्तक के प्रकाशन से प्रयोगवाद की शुरुवात मानी जाती है।"}, {"id": 47, "question": "47. इनमें से कौन-सा उपन्यास यशपाल का नहीं है?", "options": ["दादा कामरेड", "कब तक पुकारूँ", "दिव्या", "झूठा सच"], "correct_index": 1, "explanation": "कब तक पुकारूँ उपन्यास रांगेव राघव का है। वहीं दादा कामरेड, दिव्या और झूठा सच उपन्यास यशपाल का है।"}, {"id": 48, "question": "48. तीसरा सप्तक कब प्रकाशित हुआ?", "options": ["1960 ई.", "1959 ई.", "1951 ई.", "1970 ई."], "correct_index": 1, "explanation": "तीसरा सप्तक सन् 1959 ई. में अज्ञेय के संपादकत्व में हुआ।"}, {"id": 49, "question": "49. ‘पुष्प की अभिलाषा’ नामक कविता के रचयिता कौन हैं?", "options": ["बालकृष्ण शर्मा ‘नवीन’", "रामधारी सिंह दिनकर", "माखनलाल चतुर्वेदी", "रामनरेश त्रिपाठी"], "correct_index": 2, "explanation": "‘पुष्प की अभिलाषा’ नामक कविता के रचयिता माखनलाल चतुर्वेदी हैं। हिमकिरीटनी, हिमतरंगिनी आदि इनकी अन्य रचनाएँ हैं।"}, {"id": 50, "question": "50. आधुनिक मीरा किसे कहा जाता है?", "options": ["सुभद्रा कुमारी चौहान", "मन्नू भण्डारी", "महादेवी वर्मा", "उषा प्रियंवदा"], "correct_index": 2, "explanation": "आधुनिक मीरा छायावादी कवयित्री महादेवी वर्मा को कहा जाता है।"}, {"id": 51, "question": "51. ‘प्रकृति का सुकुमार राजकुमार’ किसे कहा जाता है?", "options": ["प्रसाद", "पंत", "निराला", "बच्चन"], "correct_index": 1, "explanation": "‘प्रकृति का सुकुमार राजकुमार’ सुमित्रानंदन पंत को कहा जाता है।"}, {"id": 52, "question": "52. हिंदी खड़ी बोली का प्रथम महाकाव्य कौन-सा है?", "options": ["साकेत", "सामधेनी", "हल्दीघाटी", "प्रियप्रवास"], "correct_index": 3, "explanation": "हिंदी खड़ी बोली का प्रथम महाकाव्य हरिऔध का प्रियप्रवास है।"}, {"id": 53, "question": "53. ‘कलम का सिपाही’ का लेखक कौन हैं?", "options": ["प्रेमचंद", "अमृतराय", "रामविलास शर्मा", "शिवरानी देवी"], "correct_index": 1, "explanation": "‘कलम का सिपाही’ का लेखक अमृतराय हैं। यह प्रेमचंद की जीवनी है। वहीं ‘प्रेमचंद घर में’ शिवरानी देवी और निराला की साहित्य साधना निराला की कृत है। निराला की साहित्य साधना 3 खंडों में प्रकाशित है।"}, {"id": 54, "question": "54. ‘मुझे चाँद चाहिए’ किस विधा की कृति है?", "options": ["कविता", "नाटक", "कहानी", "उपन्यास"], "correct_index": 3, "explanation": "‘मुझे चाँद चाहिए’ सुरेंद्र वर्मा का उपन्यास है। इस उपन्यास के लिए उन्हें 1996 ई. में साहित्य अकादेमी पुरस्कार से सम्मानित किया गया था। अँधेरे से परे, दो मुर्दों के लिए गुलदस्ताँ आदि उनके अन्य उपन्यास हैं।"}, {"id": 55, "question": "55. ‘सारा आकाश’ किसकी कृति है?", "options": ["मन्नू भंडारी", "राजेंद्र यादव", "कमलेश्वर", "अज्ञेय"], "correct_index": 1, "explanation": "‘सारा आकाश’ राजेंद्र यादव का उपन्यास है। प्रेत बोलते हैं, उखड़े हुये लोग, कुलटा, शह और मात, एक इंच मुस्कान (मन्नू भंडारी के साथ), अनदेखे अनजाने पुल, मंत्र विद्या आदि उनके अन्य उपन्यास हैं।"}, {"id": 56, "question": "56. ‘संशय की एक रात’ किस कवि की कृति है?", "options": ["अज्ञेय", "नरेश मेहता", "नरेंद्र शर्मा", "केसरी कुमार"], "correct_index": 1, "explanation": "‘संशय की एक रात’ नरेश मेहता का प्रबंध काव्य है। महाप्रस्थान, प्रवाद पर्व, शबरी इनके अन्य प्रबंध काव्य तथा वन पाखी सुनों, बोलने दो चीड़ को, समर्पित एकांत, चैत्या आदि काव्य संग्रह हैं।"}, {"id": 57, "question": "57. ‘आषाढ़ का एक दिन’ नामक नाटक के रचयिता हैं?", "options": ["जयशंकर प्रसाद", "सुरेंद्र वर्मा", "लक्ष्मीनारायण मिश्र", "मोहन राकेश"], "correct_index": 3, "explanation": "‘आषाढ़ का एक दिन’ नामक नाटक के रचयिता मोहन राकेश हैं। लहरों के राजहंस और आधे अधूरे इनके अन्य नाटक हैं।"}, {"id": 58, "question": "58. ‘कवित्त रत्नाकर’ के रचयिता हैं-", "options": ["जगन्नाथ रत्नाकर", "सेनापति", "मतिराम", "बोधा"], "correct_index": 1, "explanation": "‘कवित्त रत्नाकर’ और ‘कल्पद्रुम’ के रचयिता सेनापति हैं।"}, {"id": 59, "question": "59. इनमें से कौन-सा जोड़ा सही है?", "options": ["श्री संप्रदाय- मध्वाचार्य", "रुद्र संप्रदाय- विष्णु स्वामी", "सनकादि संप्रदाय- श्री हितहरिवंश", "राधा बल्लभ संप्रदाय- निम्बर्काचार्य"], "correct_index": 1, "explanation": "सुमेलित- रुद्र संप्रदाय- विष्णु स्वामी, श्री संप्रदाय- रामानुजाचार्य, सनकादि संप्रदाय- निम्बर्काचार्य और राधा बल्लभ संप्रदाय- श्री हितहरिवंश"}, {"id": 60, "question": "60. 500 ई. से 1100 ई. तक संस्कृत काव्यशास्त्र को क्या कहा जाता है?", "options": ["प्रवर्तन काल", "प्रतिपादन काल", "व्याख्या काल", "भाष्य काल"], "correct_index": 1, "explanation": "संस्कृत काव्यशास्त्र का काल विभाजन- प्रारम्भिक काल: (वैदिक काल-650 ई.), रचनात्मक काल (650 ई.-850 ई.), निर्णयात्मक काल: (850 ई.-1050 ई.), व्याख्या काल: (1050 ई.-1750 ई.)"}, {"id": 61, "question": "61. ‘निर्धन के धन-सी तुम आई।’ में कौन-सा अलंकार है?", "options": ["उपमा", "रूपक", "उत्प्रेक्षा", "अनुप्रास"], "correct_index": 0, "explanation": "‘निर्धन के धन-सी तुम आई।’ में उपमा अलंकार है। जहाँ दो भिन्न वस्तुओं में रूप, गुण आदि की समानता दिखाई जाती है, वहाँ उपमा अलंकार होता है।"}, {"id": 62, "question": "62. इन पंक्तियों में किस छ्ंद का प्रयोग हुआ है-", "options": ["दोहा", "गीतिका", "चौपाई", "कवित्त"], "correct_index": 0, "explanation": "इन पंक्तियों में दोहा छ्ंद का प्रयोग हुआ है। दोहे के विषम चरण में 13-13 और सम चरण में 11-11 मात्राएँ होती हैं और सम चरणों के अंत में गुरु होता है।"}, {"id": 63, "question": "63. इन पंक्तियों में कौन-सा छ्ंद है?", "options": ["दोहा", "चौपाई", "उल्लाला", "गीतिका"], "correct_index": 2, "explanation": "इन पंक्तियों में उल्लाला छ्ंद है। उल्लाला के विषम चरणों में 15-15 मात्राएँ और सम चरणों में 13-13 मात्राएँ होती हैं।"}, {"id": 64, "question": "64. इन पंक्ति में कौन-सा रस है?", "options": ["वात्सल्य रस", "वीभत्स रस", "हास्य रस", "रौद्र रस"], "correct_index": 3, "explanation": "उपर्युक्त पंक्ति में रौद्र रस है।"}, {"id": 65, "question": "65. निम्न पंक्ति में कौन-सा रस है?", "options": ["वीर रस", "करुण रस", "भक्ति रस", "रौद्र रस"], "correct_index": 2, "explanation": "उपर्युक्त पंक्ति में भक्ति रस है।"}, {"id": 66, "question": "66. ब्रजभाषा का विकास इनमें किस प्रकृत/अपभ्रंश से हुआ है?", "options": ["मागधी", "पैशाची", "शौरसेनी", "अर्धमागधी"], "correct_index": 2, "explanation": "ब्रजभाषा का विकास शौरसेनी अपभ्रंश से हुआ है। शौरसेनी अपभ्रंश से पश्चिमी हिंदी, राजस्थानी और पहाड़ी उपभाषा का विकास हुआ, फिर इनसे इनके बोलियों का। वहीं अर्ध मागधी से पूर्वी हिंदी और मगही से बिहारी हिंदी का विकास हुआ है।"}, {"id": 67, "question": "67. आगरा किस बोली का क्षेत्र है?", "options": ["अवधी", "खड़ीबोली", "ब्रजभाषा", "छत्तीसगढ़ी"], "correct_index": 2, "explanation": "आगरा ब्रजभाषा बोली का क्षेत्र है जो पश्चिमी उपभाषा की बोली है। ब्रजभाषा के प्रमुख क्षेत्र- आगरा, मथुरा, अलीगढ़, बरेली, बदायूँ, एटा, मैनपुरी, गुरुग्राम, भरतपुर आदि हैं।"}, {"id": 68, "question": "68. इनमें से कौन-सी ध्वनि संयुक्त व्यंजन है?", "options": ["क्य", "च्च", "ट", "औ"], "correct_index": 0, "explanation": "क्य (क् + य) ध्वनि संयुक्त व्यंजन है। जब दो व्यंजन संयुक्त होकर नए सार्थक व्यंजन बनाते हैं, उसे संयुक्त व्यंजन कहते हैं। हिंदी वर्णमाला में मूलत: चार (क्ष, त्र, ज्ञ, श्र) संयुक्त व्यंजन हैं।"}, {"id": 69, "question": "69. इनमें से कौन-सा युग्म अघोष ध्वनि है?", "options": ["ग, घ", "ड, ढ", "प, फ", "द, ध"], "correct_index": 2, "explanation": "‘प, फ’ युग्म अघोष ध्वनि है। प्रत्येक वर्ग का पहला और दूसरा और श, स, ष वर्ण अघोष वर्ण होते हैं।"}, {"id": 70, "question": "70. मुंडा भाषा परिवार का क्षेत्र कौन-सा है?", "options": ["राजस्थान", "मध्यप्रदेश", "तमिलनाडु", "छोटा नागपुर"], "correct_index": 3, "explanation": "मुंडा भाषा परिवार का क्षेत्र छोटा नागपुर है।"}, {"id": 71, "question": "71. निम्नलिखित में से ‘नीलकंठ’ कौन-सा शब्द है?", "options": ["रूढ़", "यौगिक", "योगरूढ़", "इनमें से कोई नहीं"], "correct_index": 2, "explanation": "‘नीलकंठ’ योगरूढ़ शब्द है। जो शब्द अन्य शब्दों के योग से बनते हो, परन्तु एक विशेष अर्थ के लिए प्रसिद्ध होते हैं, उन्हें योगरूढ़ शब्द कहते है। जैसे- लंबोदर (लम्ब + उदर अर्थात बड़े पेट वाला)= गणेश जी"}, {"id": 72, "question": "72. निम्नलिखित में से कौन महाप्राण ध्वनि नहीं है?", "options": ["ख", "ठ", "झ", "ट"], "correct_index": 3, "explanation": "‘ट’ महाप्राण ध्वनि नहीं है। प्रत्येक वर्ग का दूसरा और चौथा वर्ण महाप्राण और पहला, तीसरा तथा पाँचवाँ वर्ण अल्पप्राण होता है।"}, {"id": 73, "question": "73. हिंदी को राजभाषा के रूप में संवैधानिक मान्यता कब मिली?", "options": ["26 जनवरी, 1950", "14 अक्तूबर, 1949", "15 अगस्त, 1947", "14 सितम्बर, 1949"], "correct_index": 3, "explanation": "हिंदी को राजभाषा (official language) के रूप में संवैधानिक मान्यता 14 सितम्बर, 1949 को मिली। भारतीय संविधान के भाग- 17 में अनुच्छेद 343 से 351 तक राजभाषा संबंधी प्रावधान दिए गए हैं। संविधान की आठवीं अनुसूची में अभी तक 22 भाषाओं को मान्यता प्रदान की गई है।"}, {"id": 74, "question": "74. ‘अशोक ने पत्र पढ़ा।’ इस वाक्य में कौन-सा कारक है?", "options": ["कर्ता", "अधिकरण", "कर्म", "करण"], "correct_index": 0, "explanation": "‘अशोक ने पत्र पढ़ा।’ इस वाक्य में कर्ता कारक है। वाक्य में जिस शब्द से कार्य करने का बोध हो, उसे कर्ता कहते हैं। कारक की पहचान विभक्ति / परसर्ग से होती है- कर्ता- ने, कर्म- को, करण- से, संप्रदान- को, के, लिए, अपादान- से (अलग होने के अर्थ में), संबंध- का, के, की, रा, री, अधिकरण- में, पर, संबोधन- हे, अरे, अहो।"}, {"id": 75, "question": "75. इनमें से कौन-सा शब्द पुल्लिंग है?", "options": ["डिबिया", "दात्री", "खटमल", "जीभ"], "correct_index": 2, "explanation": "‘खटमल’ शब्द पुल्लिंग है जबकि डिबिया, दात्री और जीभ स्त्रीलिंग।"}, {"id": 76, "question": "76. ‘चंद्रमुख’ में कौन-सा समास है?", "options": ["द्विगु", "अव्ययीभाव", "कर्मधारय", "तत्पुरुष"], "correct_index": 2, "explanation": "‘चंद्रमुख’ में कर्मधारय समास है। कर्मधारय समास में प्रथम पद विशेषण और दूसरा विशेष्य या संज्ञा होता है। परंतु यदि प्रथम पद उपमान और दूसरा पद उपमेय हो तब भी कर्मधारय समास होता है। जैसे- चंद्रमुख- चंद्रमा के सदृश्य मुख"}, {"id": 77, "question": "77. ‘मैं आदर सहित नमस्कार करता हूँ।’ वाक्य का शुद्ध रूप क्या होगा?", "options": ["मैं नमस्कार आदर सहित करता हूँ।", "सादर मैं प्रणाम करता हूँ।", "मैं आदर पूर्ण नमस्कार करता हूँ।", "मैं सादर नमस्कार करता हूँ।"], "correct_index": 3, "explanation": "शुद्ध वाक्य- मैं सादर नमस्कार करता हूँ।"}, {"id": 78, "question": "78. ‘हर्ष’ शब्द का विलोम शब्द क्या है?", "options": ["विषाद", "प्रहर्ष", "खुशी", "नीरव"], "correct_index": 0, "explanation": "‘हर्ष’ शब्द का विलोम शब्द ‘विषाद’ है।"}, {"id": 79, "question": "79. ‘जो समाचार भेजता हो’ के लिए एक शब्द क्या होगा?", "options": ["संवाददाता", "सूचक", "प्रेषक", "दूत"], "correct_index": 0, "explanation": "‘जो समाचार भेजता हो’ के लिए एक शब्द ‘संवाददाता’ होगा। जो पत्र भेजता हो- प्रेषक, किसी वस्तु द्वारा सूचना देने वाला यंत्र- सूचक और किसी का संदेश ले जाने वाला- दूत।"}, {"id": 80, "question": "80. ‘एक तो दोष था ही, उस पर दूसरा दोष लग जाना’ का सही कहावत होगी-", "options": ["अधजल गगरी छलकत जाए", "हाथ कंगन को आरसी क्या", "एक तो करेला दूजे नीम चढ़ा", "छोटा मुँह बड़ी बात"], "correct_index": 2, "explanation": "‘एक तो करेला दूजे नीम चढ़ा’ कहावत का अर्थ- एक तो दोष था ही, उस पर दूसरा दोष लग जाना।"}, {"id": 81, "question": "81. ‘नैषधीचरितम्’ किसकी रचना है?", "options": ["भास", "कालिदास", "श्रीहर्ष", "भारवि"], "correct_index": 2, "explanation": "‘नैषधीचरितम्’ श्रीहर्ष की रचना है। 22 सर्गों में रचित यह ग्रंथ मुख्यत: शृंगार काव्य है। यह महाभारत के नलोपाख्यान का उपजीव्य ग्रंथ है जिसमें नल-दमयंती का प्रणय वर्णित है।"}, {"id": 82, "question": "82. इनमें सी कौन-सी रचना माघ की है?", "options": ["किरातार्जुनीय", "मेघदूत", "दशकुमारचरित्", "शिशुपालबध"], "correct_index": 3, "explanation": "‘शिशुपालबध’ रचना माघ की है। यह महाकाव्य 20 सर्गों में विभाजित है और इसमें 1650 श्लोक हैं। यह महाभारत के समापर्व का उपजीव्य ग्रंथ है। वहीं किरातार्जुनीय भारवि का, मेघदूत कालिदास का और दशकुमारचरित् दंडी का महाकाव्य है।"}, {"id": 83, "question": "83. ‘गागर में सागर भरना’ मुहावरे का अर्थ है-", "options": ["थोड़ा काम करना", "बहुत ज्यादा कहना", "थोड़े में बहुत कहना", "ज्यादा में थोड़ा कहना"], "correct_index": 2, "explanation": "‘गागर में सागर भरना’ मुहावरे का अर्थ है- ‘थोड़े में बहुत कहना’ है।"}, {"id": 84, "question": "84. ‘कविता’ का बहुवचन है-", "options": ["कवीताएँ", "कविताएँ", "कविताइयाँ", "कविताए"], "correct_index": 1, "explanation": "‘कविता’ का बहुवचन कविताएँ है।"}, {"id": 85, "question": "85. ‘जीवैषणा’ का सही संधि-विच्छेद कीजिए-", "options": ["जीव + ऐषणा", "जीव + एषणा", "जीवै + षणा", "जीव + एैषणा"], "correct_index": 1, "explanation": "‘जीवैषणा’ का सही संधि-विच्छेद- जीव + एषणा (वृद्धि स्वर संधि)"}, {"id": 86, "question": "86. ‘प्रेमातुर’ शब्द में इनमें कौन-सा समास नहीं है?", "options": ["द्विगु", "बहुव्रीहि", "अव्ययीभाव", "तत्पुरुष"], "correct_index": 0, "explanation": "‘प्रेमातुर’ शब्द में इनमें द्विगु समास नहीं है। जबकि तत्पुरुष, अव्ययीभाव और बहुव्रीहि समास है।"}, {"id": 87, "question": "87. ‘स: हस्तेन खादति।’ में कौन-सा कारक है?", "options": ["कर्त्ता", "संबंध", "कर्म", "करण"], "correct_index": 3, "explanation": "‘स: हस्तेन खादति।’ (वह हाथ से खाता है) में करण कारक है। करण कारक का चिह्न से है।"}, {"id": 88, "question": "88. ‘कविता का मर्म’ में कौन-सी विभक्ति है?", "options": ["षष्ठी", "सप्तमी", "प्रथमा", "तृतीया"], "correct_index": 0, "explanation": "‘कविता का मर्म’ में षष्ठी विभक्ति है। षष्ठी विभक्ति को संबंध कारक कहते हैं, इसका चिह्न का, के, की, रा, रे, री है।"}, {"id": 89, "question": "89. ‘रामकृष्णौ’ में कौन-सा समास है?", "options": ["अव्ययीभाव", "द्वंद्व", "तत्पुरुष", "बहुव्रीहि"], "correct_index": 1, "explanation": "‘रामकृष्णौ’ में द्वंद्व समास है। जिस पद में दोनों पद प्रधान हों और दोनों संज्ञा अथवा विशेषण हों, द्वंद्व समास होता है। जैसे- रामकृष्णौ- राम कृष्ण"}, {"id": 90, "question": "90. ‘सज्जन: पापाद् जुगुप्सेते।’ का हिंदी अनुवाद कीजिए।", "options": ["सज्जन पाप से घृणा करता है।", "सज्जन पाप करेगा।", "सज्जन पाप से घृणा करेगा।", "सज्जन घृणा से पाप करता है।"], " const AL=['A','B','C','D','E'];
let att=0,cor=0,wrg=0;
function upd(){
  document.getElementById('va').textContent=att;
  document.getElementById('vc').textContent=cor;
  document.getElementById('vw').textContent=wrg;
  document.getElementById('pf').style.width=Math.round(att/Q.length*100)+'%';
}
function build(){
  const c=document.getElementById('qc');
  Q.forEach((q,qi)=>{
    const card=document.createElement('div');
    card.className='qcard';card.id='c'+qi;
    card.innerHTML=`
      <div class="qmeta">
        <span class="qnum">प्रश्न ${qi+1}</span>
        <span class="qst" id="st${qi}"></span>
      </div>
      <div class="qtxt">${q.question}</div>
      <div class="opts" id="o${qi}"></div>
      ${q.explanation?`<div class="tbox" id="t${qi}">
        <div class="tlabel">💡 याद रखें</div>
        <div class="ttext">${q.explanation}</div></div>`:''}`;
    const od=card.querySelector('#o'+qi);
    q.options.forEach((opt,oi)=>{
      const b=document.createElement('button');
      b.className='opt';
      b.innerHTML=`<span class="oc">${AL[oi]}</span><span class="ol">${opt}</span>`;
      b.addEventListener('click',()=>ans(qi,oi));
      od.appendChild(b);
    });
    c.appendChild(card);
  });
}
function ans(qi,ch){
  const q=Q[qi];
  const btns=document.querySelectorAll('#o'+qi+' .opt');
  btns.forEach(b=>b.disabled=true);
  btns[q.correct_index].classList.add('correct');
  btns[q.correct_index].querySelector('.oc').textContent='✓';
  const st=document.getElementById('st'+qi);
  if(ch===q.correct_index){cor++;st.textContent='✅ सही';st.style.color='var(--correct)';}
  else{btns[ch].classList.add('wrong');btns[ch].querySelector('.oc').textContent='✗';
        wrg++;st.textContent='❌ गलत';st.style.color='var(--wrong)';}
  st.classList.add('show');
  const t=document.getElementById('t'+qi);
  if(t)t.classList.add('show');
  att++;upd();
}
build();upd();
</script>
