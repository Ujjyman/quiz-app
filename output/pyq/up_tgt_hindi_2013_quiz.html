<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UP TGT हिंदी 2013 — PYQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

:root {
  --bg:#f0f4ff;--surface:#fff;--surface2:#f8faff;
  --border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --primary:#4f46e5;--primary-dark:#3730a3;--primary-light:#eef2ff;
  --pyq:#0891b2;--pyq-bg:#ecfeff;--pyq-dark:#0e7490;
  --ts:#ea580c;--ts-bg:#fff7ed;--ts-dark:#c2410c;
  --correct:#16a34a;--correct-bg:#dcfce7;--correct-bdr:#86efac;
  --wrong:#dc2626;--wrong-bg:#fee2e2;--wrong-bdr:#fca5a5;
  --trick:#d97706;--trick-bg:#fffbeb;--trick-bdr:#fcd34d;
  --sel-bg:#eef2ff;--sel-bdr:#4f46e5;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --r:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f1117;--surface:#1a1d27;--surface2:#141720;
    --border:#2d3141;--text:#e2e8f0;--muted:#94a3b8;
    --primary:#818cf8;--primary-dark:#6366f1;--primary-light:#1e1b4b;
    --pyq:#22d3ee;--pyq-bg:#0c1a1e;--pyq-dark:#0891b2;
    --ts:#fb923c;--ts-bg:#1c0f05;--ts-dark:#ea580c;
    --correct:#4ade80;--correct-bg:#052e16;--correct-bdr:#166534;
    --wrong:#f87171;--wrong-bg:#2d0909;--wrong-bdr:#991b1b;
    --trick:#fbbf24;--trick-bg:#1c1500;--trick-bdr:#92400e;
    --sel-bg:#1e1b4b;--sel-bdr:#818cf8;
    --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.25);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans Devanagari','Mangal',system-ui,sans-serif;
     background:var(--bg);color:var(--text);line-height:1.7;
     -webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

.qheader{position:sticky;top:0;z-index:100;background:var(--surface);
          border-bottom:1px solid var(--border);padding:0 18px;
          box-shadow:0 2px 12px rgba(0,0,0,.08)}
.htop{display:flex;align-items:center;gap:10px;padding:11px 0 7px}
.back{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);
       background:var(--surface2);display:flex;align-items:center;justify-content:center;
       font-size:16px;flex-shrink:0;text-decoration:none;transition:background .15s}
.back:hover{background:var(--pyq-bg)}
.htitle{font-size:14px;font-weight:800;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hmode{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;
        background:var(--pyq-bg);color:var(--pyq);flex-shrink:0}
.stats{display:flex;gap:6px;padding:0 0 9px;flex-wrap:wrap}
.sp{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700;
     padding:3px 11px;border-radius:100px;background:var(--surface2);border:1px solid var(--border)}
.sp.sc{background:var(--correct-bg);color:var(--correct);border-color:var(--correct-bdr)}
.sp.sw{background:var(--wrong-bg);  color:var(--wrong);  border-color:var(--wrong-bdr)}
.pbar{height:3px;background:var(--border);margin:0 -18px}
.pfill{height:100%;background:linear-gradient(90deg,var(--pyq),var(--primary));
        width:0%;transition:width .3s}
.wrap{max-width:780px;margin:0 auto;padding:22px 15px 70px}
.qcard{background:var(--surface);border:1px solid var(--border);
        border-radius:var(--r);padding:20px 20px 16px;margin-bottom:16px;
        box-shadow:var(--shadow)}
.qmeta{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.qnum{font-size:11px;font-weight:800;color:var(--pyq);
       background:var(--pyq-bg);padding:3px 10px;border-radius:100px;letter-spacing:.4px}
.qst{margin-left:auto;font-size:12px;opacity:0;transition:opacity .2s}
.qst.show{opacity:1}
.qtxt{font-size:15px;font-weight:600;line-height:1.65;margin-bottom:14px}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;
      border-radius:9px;border:1.5px solid var(--border);background:var(--surface2);
      cursor:pointer;font-family:inherit;font-size:14px;color:var(--text);
      text-align:left;line-height:1.5;width:100%;transition:all .15s}
.oc{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);
     flex-shrink:0;display:flex;align-items:center;justify-content:center;
     margin-top:1px;font-size:11px;font-weight:800;transition:all .15s;background:var(--surface)}
.opt:hover:not(:disabled) .oc{border-color:var(--pyq);background:var(--pyq-bg)}
.opt:hover:not(:disabled){border-color:var(--pyq);background:var(--pyq-bg)}
.opt:disabled{cursor:default}
.opt.correct{background:var(--correct-bg);border-color:var(--correct-bdr)}
.opt.correct .oc{background:var(--correct);border-color:var(--correct);color:#fff}
.opt.correct .ol{color:var(--correct);font-weight:700}
.opt.wrong{background:var(--wrong-bg);border-color:var(--wrong-bdr)}
.opt.wrong .oc{background:var(--wrong);border-color:var(--wrong);color:#fff}
.opt.wrong .ol{color:var(--wrong);font-weight:700}
.tbox{margin-top:13px;border-radius:9px;border:1.5px solid var(--trick-bdr);
       background:var(--trick-bg);padding:12px 14px;display:none;
       animation:fs .25s ease}
.tbox.show{display:block}
@keyframes fs{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.tlabel{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;
         color:var(--trick);letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px}
.ttext{font-size:13px;line-height:1.7;color:var(--text)}
.ttext strong{color:var(--trick)}
</style>
</head>
<body>
<div class="qheader">
  <div class="htop">
    <a href="../index.html" class="back">←</a>
    <div class="htitle">UP TGT हिंदी 2013</div>
    <div class="hmode">⚡ PYQ</div>
  </div>
  <div class="stats">
    <div class="sp">📋 प्रयास: <span id="va">0</span></div>
    <div class="sp sc">✅ सही: <span id="vc">0</span></div>
    <div class="sp sw">❌ गलत: <span id="vw">0</span></div>
    <div class="sp" style="margin-left:auto">📝 125 प्रश्न</div>
  </div>
  <div class="pbar"><div class="pfill" id="pf"></div></div>
</div>
<div class="wrap" id="qc"></div>
<script>
const Q=[{"id": 1, "question": "1. ‘साखी’ किस कवि का काव्य-संग्रह है?", "options": ["केदारनाथ सिंह", "कुँवर नारायण", "मलयज", "विजयदेव नारायण साही"], "correct_index": 3, "explanation": "‘साखी’ काव्य-संग्रह कवि विजयदेव नारायण साही का है। मछलीघर, संवाद तुमसे, आवाज़ हमारी जाएगी आदि उनके अन्य काव्य संग्रह हैं। साही की कवितायें अज्ञेय द्वारा संपादित तीसरे सप्तक में भी संकलित हैं।"}, {"id": 2, "question": "2. ‘अथवा’ व्याकरण की दृष्टि है?", "options": ["संधि", "उपसर्ग", "अन्वय", "अव्यय"], "correct_index": 3, "explanation": "‘अथवा’ व्याकरण की दृष्टि अव्यय है।"}, {"id": 3, "question": "3. ‘सम्पतिशास्त्र’ के लेखक का नाम है:", "options": ["दास आचार्य महावीर प्रसाद द्विवेदी", "बाबू श्याम सुंदर", "आचार्य हजारी प्रसाद द्विवेदी", "आचार्य रामचंद्र शुक्ल"], "correct_index": 0, "explanation": "‘सम्पतिशास्त्र’ के लेखक आचार्य महावीर प्रसाद द्विवेदी हैं। नैषध चरित्र चर्चा, हिंदी भाषा की उत्पत्ति, कौटिल्य कुठार, कालिदास की निरकुंशता, रसज्ञ रंजन, कालिदास और उनकी कविता, सुकवि संकीर्तन, साहित्य सीकर, बेकन-विचार-रत्नावली आदि उनकी अन्य रचनाएँ हैं।"}, {"id": 4, "question": "4. ‘राधावल्‍लभ संप्रदाय’ का प्रवर्तन किसने किया?", "options": ["वल्लभाचार्य", "मध्वाचर्य", "हितहरिवंश", "सूरदास"], "correct_index": 2, "explanation": "‘राधावल्‍लभ संप्रदाय’ का प्रवर्तन हितहरिवंश ने किया। वहीं वल्लभाचार्य ने ‘बल्लभ संप्रदाय’ और मध्वाचर्य ने द्वैतवाद का प्रवर्तन किया।"}, {"id": 5, "question": "5. ‘अरुण यह मधुमय देश हमारा’ यह किसने कहा?", "options": ["ध्रुवस्वामिनी", "देवसेना", "कार्नेलिया", "मधुलिका"], "correct_index": 2, "explanation": "‘अरुण यह मधुमय देश हमारा’ कार्नेलिया ने कहा है। यह जयशंकर प्रसाद द्वारा रचित ऐतिहासिक नाटक ‘चंद्रगुप्त’ में संकलित है जो 1931 ई. में लिखा गया था।"}, {"id": 6, "question": "6. निम्न में से कौन किसके लिए प्रसिद्ध नहीं है?", "options": ["उपमा के लिए कालिदास", "करूणा के लिए भवभूति", "अलंकार के लिए भामह", "वक्रोक्ति के लिए क्षेमेंद्र"], "correct_index": 3, "explanation": "क्षेमेंद्र औचित्य सिद्धांत के लिए प्रसिद्ध हैं। औचित्यविचारचर्चा, कविकण्ठाभरण और सुवृत्ततिलक इनके ग्रंथ हैं।"}, {"id": 7, "question": "7. गोकुलनाथ की रचना का नाम है-", "options": ["चौरासी वैष्णवन की वार्ता", "भक्तमाल", "छिताईवार्ता", "गोसाईचरित"], "correct_index": 0, "explanation": "गोकुलनाथ की रचना का नाम ‘चौरासी वैष्णवन की वार्ता’ है। वहीं ‘भक्तमाल’ नाभादास की, ‘छिताईवार्ता’ नारायणदास की और ‘गोसाईचरित’ वेणीमाधवदास की रचना है।"}, {"id": 8, "question": "8. छायावाद को ‘स्थूल के प्रति सूक्ष्म का विद्रोह’ किसने कहा है?", "options": ["जयशंकर प्रसाद", "महादेवी वर्मा", "नंददुलारे वाजपेयी", "डॉ. नगेंद्र"], "correct_index": 3, "explanation": "छायावाद को ‘स्थूल के प्रति सूक्ष्म का विद्रोह’ डॉ. नगेंद्र ने कहा है।"}, {"id": 9, "question": "9. नटों के जीवन संघर्ष का उल्लेख किस उपन्यास में नहीं है?", "options": ["कब तक पुकारूँ", "शैलूष", "झूलानट", "सेवासदन"], "correct_index": 3, "explanation": "सेवासदन उस महिला की कहानी है जिसे हालात ने वेश्या बना दिया है। ‘सेवासदन में नारी जीवन की समस्याओं के साथ-साथ समाज के धर्माचार्यों, मठाधीशों, धनपतियों, सुधारकों के आडंबर, दंभ, ढोंग, पाखंड, चरित्रहीनता, दहेज-प्रथा, बेमेल विवाह, पुलिस की घूसखोरी, वेश्यागमन, मनुष्य के दोहरे चरित्र, साम्प्रदायिक द्वेष आदि सामाजिक विकृतियों का विवरण मिलता है।’ ‘कब तक पुकारूँ’ जरायम पेशा करनटों की संस्कृति पर आधारित आँचलिक उपन्यास है। शैलूष दलित वर्ग के आदिवासी नटों पर आधारित उपन्यास है।"}, {"id": 10, "question": "10. निम्न में से ‘हिंदी साहित्य का अतीत’ किसने लिखा?", "options": ["डॉ. विश्वनाथ तिवारी", "आचार्य विश्वनाथ प्रसाद मिश्र", "डॉ. रामकुमार वर्मा", "राहुल सांकृत्यायन"], "correct_index": 1, "explanation": "‘हिंदी साहित्य का अतीत’ के लेखक आचार्य विश्वनाथ प्रसाद मिश्र हैं। हिंदी का सामायिक इतिहास, वाङ्मय विमर्श, कामांग कौमुदी, सत्य हरिश्चन्द्र, रसखान, घनानन्द कवित्त, रसिक प्रिया, सुदामा चरित आदि उनकी अन्य रचनाएँ हैं।"}, {"id": 11, "question": "11. किस शब्द में ‘अ’ उपसर्ग है?", "options": ["अभिमान", "अनजान", "अभाव", "अवमान"], "correct_index": 2, "explanation": "‘अभाव’ शब्द में ‘अ’ उपसर्ग है।"}, {"id": 12, "question": "12. अहेतुकी का शुद्ध रूप है-", "options": ["अहितकी", "अहेतुकी", "वेतुकी", "अभितुकी"], "correct_index": 1, "explanation": "शुद्ध रूप: अहेतुकी"}, {"id": 13, "question": "13. निम्नलिखित में द्वन्द्व समास बताइए।", "options": ["शोकाकुल", "सर्वोत्तम", "वीरपुरूष", "पाप-पुण्य"], "correct_index": 3, "explanation": "जिस समस्त पद में दोनों पद प्रधान हों तथा प्रत्येक दो पदों के बीच और, एवं, तथा, या, अथवा में से किसी एक का लोप पाया जाये उसे द्वन्द्व समास कहते हैं। जैसे- पाप-पुण्य"}, {"id": 14, "question": "14. ‘रूद्र संप्रदाय’ की स्थापना किसने की?", "options": ["रूद्र स्वामी", "श्रीस्वामी", "विष्णु स्वामी", "निम्बार्काचार्य"], "correct_index": 2, "explanation": "‘रूद्र संप्रदाय’ की स्थापना विष्णु स्वामी ने की थी। वहीं द्वैताद्वैतवाद की स्थापना निम्बार्काचार्य ने किया था।"}, {"id": 15, "question": "15. रामानुजाचार्य ने किस दर्शन का प्रतिपादन किया?", "options": ["अद्वैतवाद", "शुद्धाद्वेतवाद", "विशिष्टाद्वेतवाद", "द्वैतवाद"], "correct_index": 2, "explanation": "रामानुजाचार्य ने ‘विशिष्टाद्वेतवाद’ दर्शन का प्रतिपादन किया। वहीं अद्वैतवाद का शंकराचार्य, शुद्धाद्वेतवाद का विष्णुस्वामी और द्वैतवाद (ब्रह्म संप्रदाय) का मध्वाचार्य ने प्रतिपादन किया।"}, {"id": 16, "question": "16. ‘प्रत्येक’ का संधि विच्छेद होगा:", "options": ["प्रत्य + एक", "प्रति + एक", "प्रति + एक", "प्रत्ये + एक"], "correct_index": 1, "explanation": "‘प्रत्येक’ का संधि विच्छेद ‘प्रति + एक’ होगा। इ + ए= ये (यण संधि)"}, {"id": 17, "question": "17. निम्न में से कौन-सी रचना व्याकरण ग्रंथ है?", "options": ["कीर्तिपताका", "चर्यापद", "उक्तिव्यक्त प्रकरण", "वर्णरत्नाकर"], "correct_index": 2, "explanation": "‘उक्तिव्यक्त प्रकरण’ व्याकरण ग्रंथ है। यह दामोदर शर्मा द्वारा रचित हिंदी व्याकरण का पहला ग्रंथ है।"}, {"id": 18, "question": "18. सांप्रदायिक समस्या पर लिखा गया उपन्यास कौन है?", "options": ["तमस", "बलचनमा", "अपने अपने अजनबी", "बूँद और समुद्र"], "correct_index": 0, "explanation": "सांप्रदायिक समस्या पर लिखा गया उपन्यास ‘तमस’ (भीष्म साहनी) है। इसका प्रकाशन वर्ष 1973 ई. में हुआ था। वहीं बलचनमा ‘नागार्जुन’ का, अपने अपने अजनबी ‘अज्ञेय’ का और बूँद और समुद्र ‘अमृतलाल नागर’ का उपन्यास है।"}, {"id": 19, "question": "19. ब्रजभाषा का क्षेत्र नहीं है?", "options": ["धौलपुर", "सरगुजा", "मथुरा", "आगरा"], "correct_index": 1, "explanation": "सरगुजा छत्तीसगढ़ी भाषा का क्षेत्र है, जो छत्तीसगढ़ का एक जिला है। वहीं धौलपुर, मथुरा और आगरा ब्रजभाषा क्षेत्र हैं।"}, {"id": 20, "question": "20. ‘शिवराज भूषण’ ग्रंथ में किसका विवेचन मिलता है?", "options": ["रस", "ध्वनि", "अलंकार", "औचित्य"], "correct_index": 2, "explanation": "‘शिवराज भूषण’ (भूषण) ग्रंथ में अलंकार का विवेचन मिलता है। अलंकारों में उपमा अलंकार को ही उत्तम मानते हैं। शिवाबावनी, छत्रसालदशक, भूषण उल्लास, भूषण हजारा, दूषनोल्लासा इनके अन्य ग्रंथ हैं। शिवाबावनी और छत्रसाल दशक वीर रस से ओतप्रोत ग्रंथ है।"}, {"id": 21, "question": "21. फणीश्वरनाथ रेणु कौन-सी कहानी है?", "options": ["रसप्रिया", "रसआखेटक", "रसिकप्रिया", "प्रिया नीलकंठी"], "correct_index": 0, "explanation": "‘रसप्रिया’ फणीश्वरनाथ ‘रेणु’ की कहानी है। मारे गये गुलफाम (तीसरी कसम), एक आदिम रात्रि की महक, लाल पान की बेगम, पंचलाइट, तबे एकला चलो रे, ठेस, संवदिया आदि इनकी अन्य कहानियाँ हैं। वहीं रसिकप्रिया ‘केशवदास’ की रचना है और प्रिया नीलकंठी एवं रसआखेटक ‘कुबेर नाथ राय’ के निबंध हैं।"}, {"id": 22, "question": "22. ‘साकेत’ महाकाव्य का सर्वाधिक मार्मिक सर्ग है:", "options": ["षष्ठ", "सप्तम", "अष्टम", "नवम्‌"], "correct_index": 3, "explanation": "‘साकेत’ महाकाव्य का सर्वाधिक मार्मिक ‘नवम्‌’ सर्ग है। इस सर्ग में मैथिलीशरण गुप्त ने उर्मिला के विरही जीवन के विभिन्न चित्र प्रस्तुत किए हैं।"}, {"id": 23, "question": "23. ‘भारत-भारती’ का प्रकाशन किस वर्ष हुआ?", "options": ["1912 ई.", "1914 ई.", "1916 ई.", "1918 ई."], "correct_index": 0, "explanation": "‘भारत भारती’ मैथिलीशरण गुप्त की प्रसिद्ध काव्यकृति है जिसका प्रकाशन वर्ष 1912 ई. है।"}, {"id": 24, "question": "24. निम्न में से कौन रेखाचित्र विधा की रचना नहीं है?", "options": ["कठगुलाब", "क्षण बोले कण मुस्काए", "पुरानी स्मृतियाँ", "रेखाएँ बोल उठीं"], "correct_index": 0, "explanation": "‘कठगुलाब’ मृदुला गर्ग का उपन्यास है। ‘क्षण बोले कण मुस्काए’ कन्हैयालाल मिश्र प्रभाकर का रेखाचित्र है। ‘पुरानी स्मृतियाँ’ प्रकाशचन्द्र गुप्त का और ‘रेखाएँ बोल उठीं’ देवेंद्र सत्यार्थी का संस्मरण है।"}, {"id": 25, "question": "25. समस्त पृथ्वी से संबंध रखने वाला कहलाता है-", "options": ["सार्वभौमिक", "सार्वदेशिक", "सर्वज्ञ", "सार्वकालिक"], "correct_index": 0, "explanation": "समस्त पृथ्वी से संबंध रखने वाला ‘सार्वभौमिक’ कहलाता है।"}, {"id": 26, "question": "26. ‘पहला गिरमिटिया’ उपन्यास विशेषकर किस पर केंद्रित है?", "options": ["पं. जवाहरलाल नेहरू", "महात्मा गांधी", "लालबहादुर शास्त्री", "विनोवा भावे"], "correct_index": 1, "explanation": "‘पहला गिरमिटिया’ गिरिराज किशोर द्वारा रचित एक उपन्यास है जो ‘महात्मा गांधी’ पर केंद्रित है।"}, {"id": 27, "question": "27. रीतिकाल को ‘अलंकृतकाल’ नाम किसने दिया?", "options": ["रमाशंकर शुक्ल रसाल", "विश्वनाथ मिश्र", "मिश्रबन्धु", "रामचंद्र शुक्ल"], "correct_index": 2, "explanation": "रीतिकाल को ‘अलंकृतकाल’ नाम मिश्रबन्धु ने दिया। रामचंद्र शुक्ल ने रीतिकाल, रमाशंकर शुक्ल रसाल ने ‘कलाकाल’, विश्वनाथ मिश्र ने ‘शृंगारकाल’ नाम दिया है।"}, {"id": 28, "question": "28. ‘वागर्थ’ पत्रिका कहां से प्रकाशित होती है?", "options": ["मुम्बई", "वाराणसी", "नई दिल्‍ली", "कोलकाता"], "correct_index": 3, "explanation": "‘वागर्थ’ पत्रिका ‘कोलकाता’ से प्रकाशित होती है।"}, {"id": 29, "question": "29. ‘सूर्य की अंतिम किरण से सूर्य की पहली किरण तक’ किसकी नाट्य कृति है?", "options": ["सुरेन्द्र वर्मा", "रामकुमार वर्मा", "महादेवी वर्मा", "भगवती चरण वर्मा"], "correct_index": 0, "explanation": "सूर्य की अंतिम किरण से सूर्य की पहली किरण तक’ सुरेन्द्र वर्मा की नाट्य कृति है।"}, {"id": 30, "question": "30. महाप्राण ध्वनियाँ व्यंजन-वर्ग में किससे संबंधित हैं?", "options": ["पहला, दूसरा", "दूसरा, तीसरा", "दूसरा, चौथा", "पहला, चौथा"], "correct_index": 2, "explanation": "व्यंजन-वर्ग में दूसरे और चौथे वर्ण महाप्राण ध्वनियाँ हैं। जैसे- ख, घ, छ, झ, ठ आदि।"}, {"id": 31, "question": "31. ‘जो मापा न जा सके’, इसका सही अर्थ है-", "options": ["अमानक", "अपरिग्रह", "अपरिमेय", "अतुल्य"], "correct_index": 2, "explanation": "‘जो मापा न जा सके’, इसका सही अर्थ ‘अपरिमेय’ है।"}, {"id": 32, "question": "32. निम्न में कौन-सी रचना एवं रचनाकार का युग्म सही नहीं है?", "options": ["काव्यनिर्णय- भिखारीदास", "रसरहस्य- कुलपतिमिश्र", "रसविलास- चिंतामणि", "भावविलास- केशवदास"], "correct_index": 3, "explanation": "‘भावविलास’ (1746 ई.) कवि देव की रचना है। देव का पूरा नाम देवदत्ता था। अष्टयाम, भवानी विलास, कुशल विलास, प्रेम चंद्रिका, जातिविलास, रसविलास आदि इनके अन्य ग्रंथ हैं।"}, {"id": 33, "question": "33. भारतेंदु ने यात्रावृत्त संबंधी कौन-सी रचना लिखी?", "options": ["गया यात्रा", "इलाहाबाद की यात्रा", "गंगा पार की यात्रा", "सरयू पार की यात्रा"], "correct_index": 3, "explanation": "भारतेंदु ने यात्रावृत्त संबंधी ‘सरयू पार की यात्रा’ लिखी है।"}, {"id": 34, "question": "34. बिहारी हिंदी की बोली का नाम है-", "options": ["मगही", "बघेली", "छत्तीसगढ़ी", "बुंदेली"], "correct_index": 0, "explanation": "मगही, भोजपुरी और मैथिली बिहारी हिंदी की बोलियाँ हैं। वहीं बघेली और छत्तीसगढ़ी पूर्वी हिंदी की तथा बुंदेली पच्छिमी हिंदी की बोली है।"}, {"id": 35, "question": "35. ‘दुक्खम-सुक्खम’ उपन्यास की लेखिका है-", "options": ["चित्रा मुदगल", "प्रभा खेतान", "ममता कालिया", "नासिरा शर्मा"], "correct_index": 2, "explanation": "‘दुक्खम-सुक्खम’ उपन्यास की लेखिका ममता कालिया हैं। बेघर, नरक दर नरक, प्रेम कहानी, लड़कियाँ, एक पत्नी के नोट्स, दौड़, अँधेरे का ताला आदि इनके अन्य उपन्यास हैं।"}, {"id": 36, "question": "36. ‘आर्द्र’ का विलोम शब्द है:", "options": ["नम", "शुष्क", "गीला", "लचीला"], "correct_index": 1, "explanation": "‘आर्द्र’ का विलोम शब्द ‘शुष्क’ है।"}, {"id": 37, "question": "37. निम्न में से किस को ‘अपभ्रंश का वाल्मीकि’ कहा जाता है?", "options": ["सरहपा", "पुष्पदंत", "स्वयंभू", "हेमचंद"], "correct_index": 2, "explanation": "‘स्वयंभू’ को ‘अपभ्रंश का वाल्मीकि’ कहा जाता है। इन्हें अपभ्रंश का आदि महाकवि भी कहा गया है। पउमचरिउ (पद्मचरित), रिट्ठणेमिचरिउ (अरिष्ट नेमिचरित या हरिवंश पुराण) और स्वयंभू छंदस् स्वयंभू की रचनाएँ हैं।"}, {"id": 38, "question": "38. ‘जगन्नाथ’ में कौन-सी संधि है?", "options": ["वृद्धि संधि", "यण संधि", "स्वर संधि", "व्यंजन संधि"], "correct_index": 3, "explanation": "‘जगन्नाथ’ में व्यंजन संधि है- जगत् + नाथ = जगन्नाथ"}, {"id": 39, "question": "39. “भक्ति आंदोलन भारतीय चिंताधारा का स्वाभाविक विकास है।” यह कथन किसका है?", "options": ["आचार्य रामचंद्र शुक्ल", "आचार्य हजारी प्रसाद द्विवेदी", "डॉ. रामस्वरूप चतुर्वेदी", "डॉ. भगीरथ मिश्र"], "correct_index": 1, "explanation": "“भक्ति आंदोलन भारतीय चिंताधारा का स्वाभाविक विकास है।” यह कथन आचार्य हजारी प्रसाद द्विवेदी का है।"}, {"id": 40, "question": "40. प्रत्यय रहित शब्द बताइए।", "options": ["मर्मज्ञ", "वैज्ञानिक", "कृपालु", "अनुवाद"], "correct_index": 3, "explanation": "‘अनुवाद’ प्रत्यय रहित शब्द है। अनुवाद शब्द में अनु उपसर्ग और वाद मूल शब्द है- अनु + वाद = अनुवाद"}, {"id": 41, "question": "41. ‘स्वप्न’ का विलोम है-", "options": ["दिवास्वप्न", "खुमारी", "निद्रा", "जागरण"], "correct_index": 3, "explanation": "‘स्वप्न’ का विलोम शब्द ‘जागरण’ है।"}, {"id": 42, "question": "42. ‘कुटिल’ का विलोम है:", "options": ["जटिल", "रूढ़", "ऋजु", "वक्र"], "correct_index": 2, "explanation": "‘कुटिल’ का विलोम शब्द ‘ऋजु’ है। वैसे कुटिल और जटिल का विलोम शब्द ‘सरल’ तथा वक्र का ‘ऋजु’ है।"}, {"id": 43, "question": "43. ‘पुरूष’ शब्द का विलोम है-", "options": ["अपोरूष", "सरल", "कठोर", "स्त्री"], "correct_index": 3, "explanation": "पुरूष शब्द का विलोम स्त्री, कठोर का कोमल और ‘सरल’ का विलोम शब्द कठिन, कुटिल तथा जटिल होता है।"}, {"id": 44, "question": "44. ‘ओछे की प्रति बालू की भीति’ का भाव है-", "options": ["बालू की दीवार कमजोर होती है।", "ओछे लोग बालू की दीवार बनकर रहते है।", "बालू की दीवार की भांति ओछे लोगों का प्रेम अस्थायी होता है।", "बालू ओछा पदार्थ होता है।"], "correct_index": 2, "explanation": "‘ओछे की प्रति बालू की भीति’ का भाव- बालू की दीवार की भांति ओछे लोगों का प्रेम अस्थायी होता है।"}, {"id": 45, "question": "45. ‘आवाहन’ का विलोम है-", "options": ["अवगाहन", "तिरोभाव", "विसर्जन", "धन्यवाद"], "correct_index": 2, "explanation": "‘आवाहन’ का विलोम शब्द ‘विसर्जन’ है।"}, {"id": 46, "question": "46. ‘खेट कौतुकम’ किसकी रचना है?", "options": ["रहीम", "रसखान", "कवि गंग", "दादूदयाल"], "correct_index": 0, "explanation": "‘खेट कौतुकम’ रहीम की रचना है। इनका पूरा नाम अब्दुल रहीम ख़ा , "question": "95. ‘कड़ाही से गिरा चूल्हे में आ पड़ा’ का भाव है:", "options": ["एक विपत्ति से छूटकर दूसरी में आ पड़ना।", "एक बार भूल होती है तो बार-बार होती है।", "कड़ाही चूल्हे में गिर गई।", "कड़ाही और चूल्हा पास-पास होता है।"], "correct_index": 0, "explanation": "‘कड़ाही से गिरा चूल्हे में आ पड़ा’ का भाव है: एक विपत्ति से छूटकर दूसरी में आ पड़ना।"}, {"id": 96, "question": "96. ‘साये में धूप’ काव्य-कृति के रचयिता हैं:", "options": ["रघुवीर सहाय", "दुष्यंत कुमार", "नरेश मेहता", "धर्मवीर भारती"], "correct_index": 1, "explanation": "‘साये में धूप’ काव्य-कृति के रचयिता दुष्यंत कुमार हैं। एक कंठ विषपायी, सूर्य का स्वागत, आवाज़ों के घेरे, जलते हुए वन का बसंत आदि इनकी अन्य रचनाएँ हैं।"}, {"id": 97, "question": "97. ‘आसक्त’ का विलोम है-", "options": ["विरक्त", "अनुरक्त", "संसक्ति", "विभक्‍त"], "correct_index": 0, "explanation": "‘आसक्त’ का विलोम शब्द विरक्त और अनासक्त है।"}, {"id": 98, "question": "98. ‘वह पथ बंधु था’ उपन्यास के लेखक हैं:", "options": ["नरेश मेहता", "प्रभाकर माचवे", "भैरव प्रसाद गुप्त", "रांगेय राघव"], "correct_index": 0, "explanation": "‘वह पथ बंधु था’ उपन्यास के लेखक नरेश मेहता हैं। डूबते मस्तूल, श्रुति-विस्तार, श्रुति-आलाप, दो एकांत, प्रथम फाल्गुन, उत्तरकथा आदि इनके अन्य उपन्यास हैं।"}, {"id": 99, "question": "99. ‘तदीय समाज’ से किसका संबंध था?", "options": ["केशवचंद्र सेन", "भारतेंदु हरिशचंद्र", "राजा राममोहन राय", "ईश्वरचंद्र विद्यासागर"], "correct_index": 1, "explanation": "‘तदीय समाज’ से भारतेंदु हरिशचंद्र का संबंध था। वैष्णव भक्ति के प्रचार के लिए उन्होंने ‘तदीय समाज’ की स्थापना 1873 ई में की थी।"}, {"id": 100, "question": "100. ‘विज्ञानगीता’ की रचना किसने की?", "options": ["व्यास जी", "बाल गंगाधर तिलक", "केशवदास", "चिंतामणि"], "correct_index": 2, "explanation": "‘विज्ञानगीता’ की रचना केशवदास ने की है। रसिकप्रिया, कविप्रिया, नखशिख, छंदमाला, रामचंद्रिका, वीरसिंहदेव चरित, रतनबावनी और जहाँगीर जसचंद्रिका आदि उनकी अन्य रचनाएँ हैं।"}, {"id": 101, "question": "101. आदिकाल को ‘बीजवपन काल’ नाम किसने दिया?", "options": ["आचार्य रामचंद्र शुक्ल", "आचार्य भगीरथ मिश्र", "आचार्य महावीर प्रसाद द्विवेदी", "आचार्य विश्वनाथ प्रसाद मिश्र"], "correct_index": 2, "explanation": "आदिकाल को ‘बीजवपन काल’ नाम आचार्य महावीर प्रसाद द्विवेदी ने दिया है। वहीं रामचंद्र शुक्ल ने वीरगाथाकाल और विश्वनाथ प्रसाद मिश्र ने वीरकाल।"}, {"id": 102, "question": "102. ‘लक्ष्मीपुरा’ किस विधा की रचना है?", "options": ["यात्रावृत्त", "निबंध", "रिपोर्ताज", "डायरी"], "correct_index": 2, "explanation": "‘लक्ष्मीपुरा’ रिपोर्ताज विधा की रचना है। शिवदान सिंह चौहान कृत लक्ष्मीपुरा को हिंदी का पहला रिपोर्ताज माना जाता है।"}, {"id": 103, "question": "103. रामवृक्ष बेनीपुरी की कौन-सी कृति यात्रावृत्त की है?", "options": ["सागर की लहरों पर", "अप्रवासी की यात्राएँ", "पैरों में पंख बांधकर", "मेरी यूरोप यात्रा"], "correct_index": 2, "explanation": "‘पैरों में पंख बांधकर’ और ‘उड़ते चलो-उड़ते चलो’ रामवृक्ष बेनीपुरी के यात्रावृत्त हैं। वहीं ‘सागर की लहरों पर’ भगवतशरण उपाध्याय का, ‘अप्रवासी की यात्राएँ’ डॉ. नगेंद्र का और ‘मेरी यूरोप यात्रा’ राहुल सांकृत्यायन के यात्रा वृत्त हैं।"}, {"id": 104, "question": "104. ‘बिनु पग चले सुने बिनु काना; इसमे कौन-सा अलंकार है?", "options": ["विभावना", "श्लेष", "रूपक", "वक्रोक्ति"], "correct_index": 0, "explanation": "‘बिनु पग चले सुने काना’ में विभावना अलंकार है। जहाँ कारण के न होते हुए भी कार्य का होना पाया जाता है, वहाँ विभावना अलंकार होता है।"}, {"id": 105, "question": "105. निम्न में से किस कवि ने ‘सतसई’ की रचना नहीं की है?", "options": ["मतिराम", "सेनापति", "बिहारी", "वृंद"], "correct_index": 1, "explanation": "सेनापति ने ‘सतसई’ की रचना नहीं की है। मतिराम, बिहारी, वृंद और अमीरदास ने सतसई की रचना की है।"}, {"id": 106, "question": "106. ‘प्रभु जी तुम चंदन हम पानी’ इस पंक्ति के रचनाकार हैं?", "options": ["चंदनदास", "संत रैदास", "मकूलदास", "नानक"], "correct_index": 1, "explanation": "‘प्रभु जी तुम चंदन हम पानी’ इस पंक्ति के रचनाकार रैदास हैं।"}, {"id": 107, "question": "107. ‘देसिल बअना सबजन मिट्ठा’ यह प्रसिद्ध उक्ति किसने कही?", "options": ["विद्यापति", "अमीर खुसरो", "अब्दुर्रहमान", "कवि गंग"], "correct_index": 0, "explanation": "‘देसि const AL=['A','B','C','D','E'];
let att=0,cor=0,wrg=0;
function upd(){
  document.getElementById('va').textContent=att;
  document.getElementById('vc').textContent=cor;
  document.getElementById('vw').textContent=wrg;
  document.getElementById('pf').style.width=Math.round(att/Q.length*100)+'%';
}
function build(){
  const c=document.getElementById('qc');
  Q.forEach((q,qi)=>{
    const card=document.createElement('div');
    card.className='qcard';card.id='c'+qi;
    card.innerHTML=`
      <div class="qmeta">
        <span class="qnum">प्रश्न ${qi+1}</span>
        <span class="qst" id="st${qi}"></span>
      </div>
      <div class="qtxt">${q.question}</div>
      <div class="opts" id="o${qi}"></div>
      ${q.explanation?`<div class="tbox" id="t${qi}">
        <div class="tlabel">💡 याद रखें</div>
        <div class="ttext">${q.explanation}</div></div>`:''}`;
    const od=card.querySelector('#o'+qi);
    q.options.forEach((opt,oi)=>{
      const b=document.createElement('button');
      b.className='opt';
      b.innerHTML=`<span class="oc">${AL[oi]}</span><span class="ol">${opt}</span>`;
      b.addEventListener('click',()=>ans(qi,oi));
      od.appendChild(b);
    });
    c.appendChild(card);
  });
}
function ans(qi,ch){
  const q=Q[qi];
  const btns=document.querySelectorAll('#o'+qi+' .opt');
  btns.forEach(b=>b.disabled=true);
  btns[q.correct_index].classList.add('correct');
  btns[q.correct_index].querySelector('.oc').textContent='✓';
  const st=document.getElementById('st'+qi);
  if(ch===q.correct_index){cor++;st.textContent='✅ सही';st.style.color='var(--correct)';}
  else{btns[ch].classList.add('wrong');btns[ch].querySelector('.oc').textContent='✗';
        wrg++;st.textContent='❌ गलत';st.style.color='var(--wrong)';}
  st.classList.add('show');
  const t=document.getElementById('t'+qi);
  if(t)t.classList.add('show');
  att++;upd();
}
build();upd();
</script>
